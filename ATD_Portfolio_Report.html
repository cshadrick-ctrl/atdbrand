document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;

          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

'Instrument Serif';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"d07be214-5e9f-4398-8ab4-8c5119f20a26\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\/style>\n<style>\n  * { margin:0; padding:0; box-sizing:border-box; }\n  html { scroll-behavior:smooth; }\n  body { background:#fff; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }\n  a { color:#F04F24; text-decoration:none; }\n  a:hover { text-decoration:underline; }\n  ::selection { background:#F04F24; color:#fff; }\n  @keyframes riseIn { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }\n  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }\n  html.js-reveal section.rv { opacity:0; transform:translateY(30px); transition:opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }\n  html.js-reveal section.rv.rv-in { opacity:1; transform:none; }\n  @media print { section.rv { opacity:1 !important; transform:none !important; } }\n<\/style>\n<\/helmet>\n\n<div style=\"font-family:'Instrument Sans',-apple-system,sans-serif; color:#080808; background:#fff; min-height:100vh; position:relative;\">\n\n  \n\n\n  <!-- FIXED CHROME -->\n  <div style=\"position:fixed; top:0; left:0; right:0; z-index:200; display:flex; justify-content:space-between; align-items:center; padding:22px 40px; pointer-events:none; mix-blend-mode:difference;\">\n    <div style=\"display:flex; align-items:center; gap:18px; pointer-events:auto;\">\n      <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ false }}\">\n        <button sc-camel-on-click=\"{{ toContents }}\" style=\"display:flex; align-items:center; gap:8px; background:none; border:none; cursor:pointer; color:#fff; font-family:'Instrument Sans'; font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase;\">\n          <span style=\"font-size:15px; line-height:1;\">\u2190<\/span> Contents\n        <\/button>\n      <\/sc-if>\n    <\/div>\n    <div style=\"pointer-events:auto; color:#fff; font-family:'Instrument Sans'; font-size:11.5px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; text-align:right;\">\n      <sc-if value=\"{{ showProgress }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"opacity:.85;\">{{ chapNum }} / 07 &nbsp;\u00b7&nbsp; <\/span><\/sc-if>ATD2537 \u00b7 Proprietary\n    <\/div>\n  <\/div>\n\n  <!-- RUNNING PAGE NUMBER -->\n  <div style=\"position:fixed; bottom:22px; right:40px; z-index:200; pointer-events:none; color:#fff; background:rgba(15,15,17,.58); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); border:1px solid rgba(255,255,255,.14); border-radius:999px; padding:7px 14px; font-family:'Instrument Sans'; font-size:13px; font-weight:600; letter-spacing:.06em; display:flex; align-items:baseline; gap:6px;\">\n    <span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:22px; letter-spacing:0;\">{{ beat }}<\/span>\n    <span style=\"opacity:.7;\">/ {{ total }}<\/span>\n  <\/div>\n\n  <!-- ============ CONTENTS / OVERVIEW ============ -->\n  <sc-if value=\"{{ isContents }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n\n    <!-- HERO -->\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:50%; right:-8%; width:52%; height:120%; transform:translateY(-50%); background:radial-gradient(closest-side, rgba(240,79,36,.55), rgba(240,79,36,.12) 55%, transparent 72%); filter:blur(8px); pointer-events:none;\"><\/div>\n      <div style=\"position:relative; max-width:1100px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:34px;\">ATD Brand Experience Study \u00b7 ATD2537<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(46px,7.2vw,104px); line-height:.98; letter-spacing:-.04em; margin-bottom:40px;\">A portfolio at an<br><span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">inflection point.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.7vw,24px); line-height:1.55; color:#C9CACC; max-width:36ch;\">How ATD, Hercules, Ironman and Tire Pros each earn their demand, and why each one is won in a different place, by a different person, at a different moment.<\/p>\n      <\/div>\n      <div style=\"position:relative; margin-top:auto; padding-top:60px; display:flex; justify-content:space-between; align-items:flex-end; color:#7A7C80; font-size:12.5px; letter-spacing:.04em;\">\n        <span>Ammunition \u00d7 American Tire Distributors<\/span>\n        <span style=\"letter-spacing:.16em; text-transform:uppercase; font-weight:600;\">Choose a chapter \u2193<\/span>\n      <\/div>\n    <\/section>\n\n    <!-- CONTENTS LIST -->\n    <section style=\"padding:130px 8vw; max-width:1400px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:56px;\">The report, in seven chapters<\/div>\n      <div style=\"display:flex; flex-direction:column;\">\n        <sc-for list=\"{{ contents }}\" as=\"c\" hint-placeholder-count=\"7\">\n          <button sc-camel-on-click=\"{{ c.go }}\" style=\"display:grid; grid-template-columns:88px 1fr auto; gap:32px; align-items:baseline; text-align:left; background:none; border:none; border-top:1px solid #E4E5E7; padding:34px 0; cursor:pointer; width:100%; transition:padding-left .2s cubic-bezier(.2,.7,.2,1);\" style-hover=\"padding-left:14px;\">\n            <span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:34px; color:#F04F24; line-height:1;\">{{ c.num }}<\/span>\n            <span>\n              <span style=\"display:block; font-size:clamp(22px,2.3vw,32px); font-weight:500; letter-spacing:-.02em; color:#080808; margin-bottom:8px;\">{{ c.title }}<\/span>\n              <span style=\"display:block; font-size:16.5px; line-height:1.5; color:#5A5C60; max-width:56ch;\">{{ c.desc }}<\/span>\n            <\/span>\n            <span style=\"font-size:22px; color:#C4C6CA; align-self:center;\">\u2192<\/span>\n          <\/button>\n        <\/sc-for>\n        <div style=\"border-top:1px solid #E4E5E7;\"><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- HOW TO READ THE EVIDENCE -->\n    <section style=\"padding:0 8vw 130px; max-width:1400px; margin:0 auto;\">\n      <div style=\"border:1px solid #080808; border-radius:17px; padding:48px 52px;\">\n        <div style=\"display:flex; gap:24px; align-items:flex-start; margin-bottom:34px;\">\n          <div style=\"flex:none; width:40px; height:40px; border-radius:9px; background:#FFFBF2; border:1px solid #F04F24; display:flex; align-items:center; justify-content:center; font-family:'Instrument Serif'; font-style:italic; color:#F04F24; font-size:24px; line-height:1;\">!<\/div>\n          <div>\n            <h3 style=\"font-size:clamp(22px,2vw,28px); font-weight:500; letter-spacing:-.02em; margin-bottom:8px;\">How to read the evidence<\/h3>\n            <p style=\"font-size:16.5px; line-height:1.5; color:#5A5C60; max-width:60ch;\">Three kinds, weighted differently and marked throughout. Read each for what it can carry, no more.<\/p>\n          <\/div>\n        <\/div>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:10px; overflow:hidden;\">\n          <div style=\"background:#fff; padding:26px 24px;\">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:#F04F24; margin-bottom:12px;\">Stakeholder interviews<\/div>\n            <p style=\"font-size:15px; line-height:1.5; color:#5A5C60;\">Depth conversations with ATD leadership, dealers, Tire Pros operators and manufacturers. Read for pattern, not proportion.<\/p>\n          <\/div>\n          <div style=\"background:#fff; padding:26px 24px;\">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:#F04F24; margin-bottom:12px;\">Consumer<\/div>\n            <p style=\"font-size:15px; line-height:1.5; color:#5A5C60;\">Askable studies, directional. Read a percentage as the way the evidence leans, not a forecast.<\/p>\n          <\/div>\n          <div style=\"background:#fff; padding:26px 24px;\">\n            <div style=\"font-size:11px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:#8A8D92; margin-bottom:12px;\">Industry<\/div>\n            <p style=\"font-size:15px; line-height:1.5; color:#5A5C60;\">Independent third-party data, shown in gray. The tier that carries statistical weight.<\/p>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <footer style=\"background:#080808; color:#7A7C80; padding:48px 8vw; display:flex; justify-content:space-between; align-items:center; font-size:12.5px; letter-spacing:.04em;\">\n      <span style=\"letter-spacing:.14em; text-transform:uppercase; font-weight:600; color:#C9CACC;\">Ammunition \u00d7 American Tire Distributors<\/span>\n      <span>ATD2537 \u00b7 July 2026 \u00b7 Proprietary &amp; confidential<\/span>\n    <\/footer>\n\n  <\/div>\n  <\/sc-if>\n\n  <!-- ============ CHAPTER 1 \u00b7 THE LANDSCAPE ============ -->\n  <sc-if value=\"{{ isLandscape }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n    <!-- opener -->\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; bottom:-20%; left:-6%; width:46%; height:90%; background:radial-gradient(closest-side, rgba(240,79,36,.4), transparent 70%); filter:blur(10px);\"><\/div>\n      <div style=\"position:relative; max-width:1000px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">Chapter 01 \u00b7 The landscape<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(40px,5.6vw,82px); line-height:1.02; letter-spacing:-.035em; margin-bottom:36px;\">For years, the sale was simple.<br><span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">Not anymore.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:44ch;\">The category stopped following a single path to purchase. Here is what the research found running in its place.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- intro narrative -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1000px; margin:0 auto;\">\n      <p style=\"font-size:clamp(21px,2vw,30px); line-height:1.5; letter-spacing:-.01em; color:#080808; max-width:24ch; font-weight:500; margin-bottom:40px;\">For decades it ran on one formula: a product people trusted, a name they knew, and distribution that put it in front of them.<\/p>\n      <p style=\"font-size:clamp(17px,1.4vw,20px); line-height:1.65; color:#5A5C60; max-width:62ch;\">Decision and purchase happened in the same place, at the same time. That is no longer reliable, and not in one tidy direction. Some buyers settle everything before the store, through research, reviews and price. Far more decide in a hurry, when a flat or a worn tread forces the issue, and lean on whoever they trust in that moment. Either way, the brand is rarely what settles it.<\/p>\n    <\/section>\n\n    <!-- five findings -->\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">What the research turned up<\/div>\n        <h2 style=\"font-size:clamp(30px,3.6vw,52px); font-weight:500; letter-spacing:-.03em; line-height:1.05; margin-bottom:70px; max-width:20ch;\">Five findings we didn\u2019t go in expecting.<\/h2>\n        <div style=\"display:flex; flex-direction:column; gap:0;\">\n          <div style=\"display:grid; grid-template-columns:80px 1fr; gap:36px; padding:42px 0; border-top:1px solid #E4E5E7;\">\n            <span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:30px; color:#F04F24;\">01<\/span>\n            <div style=\"max-width:66ch;\">\n              <h3 style=\"font-size:clamp(21px,2.1vw,29px); font-weight:500; letter-spacing:-.02em; line-height:1.2; margin-bottom:16px;\">Consumers weren\u2019t rejecting the brands. Most had simply never met them.<\/h3>\n              <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; margin-bottom:12px;\">The problem isn\u2019t a bad reputation. It\u2019s no reputation. Once people met Hercules, very few walked away with a negative impression and a clear majority said they would consider it. The job isn\u2019t to change minds. It\u2019s to create the first real encounter.<\/p>\n              <span style=\"font-size:13px; color:#8A8D92;\">Askable consumer studies, 2026 \u00b7 Directional<\/span>\n            <\/div>\n          <\/div>\n          <div style=\"display:grid; grid-template-columns:80px 1fr; gap:36px; padding:42px 0; border-top:1px solid #E4E5E7;\">\n            <span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:30px; color:#F04F24;\">02<\/span>\n            <div style=\"max-width:66ch;\">\n              <h3 style=\"font-size:clamp(21px,2.1vw,29px); font-weight:500; letter-spacing:-.02em; line-height:1.2; margin-bottom:16px;\">There isn\u2019t one way this portfolio wins. There are several.<\/h3>\n              <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; margin-bottom:12px;\">Each brand is chosen in a different place, by a different person. Hercules on a dealer\u2019s word. Ironman on the buyer\u2019s own comparison. Tire Pros on trust in a local shop. Commercial on proof built over the life of the tire. One playbook was never going to fit all of them.<\/p>\n              <span style=\"font-size:13px; color:#8A8D92;\">ATD Brand Experience Study, 2026<\/span>\n            <\/div>\n          <\/div>\n          <div style=\"display:grid; grid-template-columns:80px 1fr; gap:36px; padding:42px 0; border-top:1px solid #E4E5E7;\">\n            <span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:30px; color:#F04F24;\">03<\/span>\n            <div style=\"max-width:66ch;\">\n              <h3 style=\"font-size:clamp(21px,2.1vw,29px); font-weight:500; letter-spacing:-.02em; line-height:1.2; margin-bottom:16px;\">The best evidence for Hercules already exists. It sits with dealers, not consumers.<\/h3>\n              <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; margin-bottom:12px;\">Where dealers carry Hercules, the fundamentals hold up: they rank its adjustment policy first in the whole category, and rate its pricing and delivery well. The gap is reach, not the product. The proof is real. It simply hasn\u2019t travelled.<\/p>\n              <span style=\"font-size:13px; color:#8A8D92;\">MTD / Hercules dealer study, April 2026<\/span>\n            <\/div>\n          <\/div>\n          <div style=\"display:grid; grid-template-columns:80px 1fr; gap:36px; padding:42px 0; border-top:1px solid #E4E5E7;\">\n            <span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:30px; color:#F04F24;\">04<\/span>\n            <div style=\"max-width:66ch;\">\n              <h3 style=\"font-size:clamp(21px,2.1vw,29px); font-weight:500; letter-spacing:-.02em; line-height:1.2; margin-bottom:16px;\">Tire Pros has earned loyalty faster than it\u2019s earned meaning.<\/h3>\n              <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; margin-bottom:12px;\">Nearly nine in ten customers come back. Yet the network\u2019s own name ranked last among the reasons they picked the shop, and neither customers nor operators could say what Tire Pros stands for beyond the local experience. The loyalty is real. The definition is missing.<\/p>\n              <span style=\"font-size:13px; color:#8A8D92;\">Askable Tire Pros visitor study, July 2026 \u00b7 Directional<\/span>\n            <\/div>\n          <\/div>\n          <div style=\"display:grid; grid-template-columns:80px 1fr; gap:36px; padding:42px 0; border-top:1px solid #E4E5E7; border-bottom:1px solid #E4E5E7;\">\n            <span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:30px; color:#F04F24;\">05<\/span>\n            <div style=\"max-width:66ch;\">\n              <h3 style=\"font-size:clamp(21px,2.1vw,29px); font-weight:500; letter-spacing:-.02em; line-height:1.2; margin-bottom:16px;\">ATD creates more value than it takes credit for.<\/h3>\n              <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; margin-bottom:12px;\">Every manufacturer we interviewed named the same strengths without prompting, availability, reach, partnership, execution, and rated ATD\u2019s service and coverage best among the distributors they use. The value is already there. The opportunity is to say so, in one voice.<\/p>\n              <span style=\"font-size:13px; color:#8A8D92;\">ATD stakeholder interviews, 2026<\/span>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- buyer arrives decided -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <h2 style=\"font-size:clamp(30px,3.8vw,56px); font-weight:500; letter-spacing:-.03em; line-height:1.05; max-width:18ch; margin-bottom:28px;\">The buyer arrives decided on everything <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">except the brand.<\/span><\/h2>\n      <p style=\"font-size:clamp(17px,1.4vw,20px); line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:70px;\">They\u2019ve settled the tier, the budget, the durability. Just not which name delivers it. That last choice gets made in the store, or in the search result, by whoever the buyer trusts to fill it, and for these brands, that\u2019s rarely the brand itself.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:40px 34px;\">\n          <div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\" data-cu=\"90\">90<span style=\"color:#F04F24;\">%<\/span><\/div>\n          <p style=\"font-size:15.5px; line-height:1.5; color:#5A5C60; margin-bottom:14px;\">rank durability as what matters most. Brand ranks last of the top four purchase factors.<\/p>\n          <span style=\"font-size:12.5px; color:#8A8D92;\">Tire Review / Google-Compete, 2024<\/span>\n        <\/div>\n        <div style=\"background:#fff; padding:40px 34px;\">\n          <div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\" data-cu=\"58\">58<span style=\"color:#F04F24;\">%<\/span><\/div>\n          <p style=\"font-size:15.5px; line-height:1.5; color:#5A5C60; margin-bottom:14px;\">arrive already decided on tier and budget, up from 47% five years ago. The name is what\u2019s still being settled.<\/p>\n          <span style=\"font-size:12.5px; color:#8A8D92;\">AutoPacific, 2024<\/span>\n        <\/div>\n        <div style=\"background:#fff; padding:40px 34px;\">\n          <div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\" data-cu=\"42\">42\u201354<span style=\"color:#F04F24;\">%<\/span><\/div>\n          <p style=\"font-size:15.5px; line-height:1.5; color:#5A5C60; margin-bottom:14px;\">is all brand loyalty holds. Even the names buyers know best can\u2019t count on a repeat.<\/p>\n          <span style=\"font-size:12.5px; color:#8A8D92;\">J.D. Power, 2024<\/span>\n        <\/div>\n      <\/div>\n      <blockquote style=\"margin-top:60px; border-left:2px solid #F04F24; padding-left:28px; max-width:60ch;\">\n        <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(22px,2.4vw,32px); line-height:1.3; color:#080808; margin-bottom:16px;\">\u201cThey\u2019re stretching tires as far as they can. Tier one and two is probably down. Tier three is maybe flat, and tier four is probably way up.\u201d<\/p>\n        <cite style=\"font-style:normal; font-size:14px; color:#8A8D92;\">Sales Leadership, ATD \u00b7 the trade-down, described from inside the trade<\/cite>\n      <\/blockquote>\n    <\/section>\n\n    <!-- recruitment -->\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,14vh,170px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:28px;\">Before a single interview<\/div>\n        <h2 style=\"font-size:clamp(28px,3.4vw,48px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:20ch; margin-bottom:56px;\">The first proof came in how hard these buyers were to find at all.<\/h2>\n        <div style=\"display:flex; align-items:baseline; gap:24px; flex-wrap:wrap; margin-bottom:28px;\">\n          <span style=\"font-size:clamp(64px,10vw,150px); font-weight:600; letter-spacing:-.04em; line-height:.9; color:#fff;\" data-cu=\"14,500\">14,500<span style=\"color:#F04F24;\">+<\/span><\/span>\n          <span style=\"font-size:18px; color:#B8BABF; max-width:26ch; line-height:1.5;\">direct contacts just to find enough consumers who could hold a conversation about Hercules, Ironman or Tire Pros.<\/span>\n        <\/div>\n        <p style=\"font-size:17px; line-height:1.65; color:#B8BABF; max-width:60ch; margin-bottom:36px;\">A brand people ask for is easy to recruit around. These weren\u2019t. The scale of the search was the finding.<\/p>\n        <blockquote style=\"border-left:2px solid #F04F24; padding-left:28px; max-width:56ch;\">\n          <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(20px,2.2vw,28px); line-height:1.35; margin-bottom:14px;\">\u201cThat\u2019s not a recruitment failure. It\u2019s the clearest possible evidence of where brand awareness actually sits.\u201d<\/p>\n          <cite style=\"font-style:normal; font-size:13.5px; color:#7A7C80;\">Ammunition \u00b7 built on Askable recruitment data, July 2026<\/cite>\n        <\/blockquote>\n      <\/div>\n    <\/section>\n\n    <!-- unprompted recall bars -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Industry data \u00b7 Unprompted recall<\/div>\n      <h2 style=\"font-size:clamp(28px,3.2vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:20ch; margin-bottom:24px;\">Recognition is thin across the whole category.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:58ch; margin-bottom:56px;\">Even the most recognised name here reaches barely one in seven buyers unprompted. This is how the category works, not how any one brand fails. Spending to be remembered buys the one thing the market has stopped rewarding.<\/p>\n      <div style=\"display:flex; flex-direction:column; gap:16px; max-width:760px;\">\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Cooper<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:100%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">14.9%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Yokohama<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:85%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">12.6%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Hankook<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:70%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">10.4%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; font-weight:600; color:#080808;\">Ironman<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:17%; background:#F04F24; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right; color:#F04F24;\">2.6%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; font-weight:600; color:#080808;\">Hercules<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:17%; background:#F04F24; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right; color:#F04F24;\">2.5%<\/span><\/div>\n      <\/div>\n      <span style=\"display:block; margin-top:24px; font-size:12.5px; color:#8A8D92;\">Askable brand-blind screener, June 2026 \u00b7 multi-select<\/span>\n    <\/section>\n\n    <!-- availability / EB -->\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <h2 style=\"font-size:clamp(26px,3vw,42px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:24ch; margin-bottom:28px;\">Being easy to bring to mind still matters. It just takes a different form for each brand.<\/h2>\n        <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:16px;\">Ehrenberg-Bass would say brands grow when they\u2019re easy to think of in a buying situation. For Hercules, those memory structures are far stronger among dealers than consumers: when a recommendation is needed, the brand comes to mind for many dealers, built on years of experience and proof.<\/p>\n        <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:24px;\">For consumers, the same associations are weak. Availability hasn\u2019t stopped mattering. It\u2019s just being created through different people, at different moments in the journey.<\/p>\n        <span style=\"font-size:12.5px; color:#8A8D92;\">Framework: Ehrenberg-Bass Institute \u00b7 Romaniuk &amp; Sharp, How Brands Grow, 2021<\/span>\n      <\/div>\n    <\/section>\n\n    <!-- grudge purchase -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">The other half of the story<\/div>\n      <h2 style=\"font-size:clamp(30px,3.6vw,52px); font-weight:500; letter-spacing:-.03em; line-height:1.05; max-width:18ch; margin-bottom:28px;\">Most of the time, a tire is a <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">grudge purchase.<\/span><\/h2>\n      <p style=\"font-size:clamp(17px,1.4vw,20px); line-height:1.6; color:#5A5C60; max-width:62ch; margin-bottom:60px;\">The self-directed buyer who researches and compares is real, Ironman is built for them. But a large share of purchases aren\u2019t planned at all. They\u2019re triggered by a problem: a flat on the shoulder, a worn-tread flag at a routine service. The trade has always called tires a grudge purchase, bought only when a problem forces it.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden; margin-bottom:56px;\">\n        <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#F04F24; margin-bottom:14px;\">Worn out<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Most replacements are driven by wear, usually caught at a routine service visit, not planned ahead.<\/p><\/div>\n        <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#F04F24; margin-bottom:14px;\">A flat<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">A large share are distress purchases: a flat, or a sudden performance problem, with no time to research.<\/p><\/div>\n        <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#F04F24; margin-bottom:14px;\">Thin loyalty<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Even among those who plan ahead, few say buying the same brand again is very important.<\/p><\/div>\n      <\/div>\n      <blockquote style=\"border-left:2px solid #F04F24; padding-left:28px; max-width:60ch; margin-bottom:44px;\">\n        <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(20px,2.2vw,29px); line-height:1.3; margin-bottom:14px;\">\u201cCasual shoppers walking into a tire shop without doing their research in advance may be subject to marketing and sales staff recommendations.\u201d<\/p>\n        <cite style=\"font-style:normal; font-size:14px; color:#8A8D92;\">Consumer Reports tire program, 2025 \u00b7 on how the low-research buyer decides<\/cite>\n      <\/blockquote>\n      <p style=\"font-size:clamp(18px,1.5vw,22px); line-height:1.5; color:#080808; font-weight:500; max-width:52ch;\">So the category hasn\u2019t gone fully self-directed. Planned or sudden, the decision still turns on who, and what, the buyer trusts at the moment they choose.<\/p>\n    <\/section>\n\n    <!-- the pattern -->\n    <section style=\"background:#080808; color:#fff; padding:clamp(110px,16vh,200px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:34px;\">The pattern<\/div>\n        <h2 style=\"font-size:clamp(32px,4.4vw,66px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:20ch; margin-bottom:40px;\">The same thing closed the sale, every time: a trusted source, at the moment of choice.<\/h2>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:58ch;\">Not the ad. Not the label. Whoever the buyer trusted to say they were making the right call, a dealer reaching for one brand, a rating that settled a doubt, an operator passing the word. Five brands. One mechanism, applied five different ways.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- takeaway -->\n    <section style=\"background:#FAF9F5; padding:clamp(80px,11vh,130px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:24px;\">Where this leaves us<\/div>\n        <p style=\"font-size:clamp(24px,3vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.18; max-width:26ch;\">The whole portfolio turns on one question: who does the buyer trust at the moment of choice, and where does that moment happen? Answer it brand by brand, and the strategy writes itself.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- chapter close -->\n    <button sc-camel-on-click=\"{{ next.landscape }}\" style=\"display:block; width:100%; text-align:left; background:#F04F24; color:#fff; border:none; cursor:pointer; padding:clamp(60px,9vh,110px) 8vw;\">\n      <span style=\"display:block; max-width:1200px; margin:0 auto;\">\n        <span style=\"display:block; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.8; margin-bottom:18px;\">Next chapter \u00b7 02<\/span>\n        <span style=\"display:flex; justify-content:space-between; align-items:baseline; gap:24px; flex-wrap:wrap;\">\n          <span style=\"font-size:clamp(30px,4vw,58px); font-weight:500; letter-spacing:-.03em;\">Hercules<\/span>\n          <span style=\"font-size:clamp(24px,3vw,40px);\">\u2192<\/span>\n        <\/span>\n        <span style=\"display:block; font-size:clamp(16px,1.4vw,20px); opacity:.9; margin-top:10px;\">The tire dealers put their own name behind.<\/span>\n      <\/span>\n    <\/button>\n  <\/div>\n  <\/sc-if>\n\n  <!-- ============ CHAPTER 2 \u00b7 HERCULES ============ -->\n  <sc-if value=\"{{ isHercules }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-15%; right:-8%; width:50%; height:100%; background:radial-gradient(closest-side, rgba(240,79,36,.42), transparent 70%); filter:blur(10px);\"><\/div>\n      <div style=\"position:relative; max-width:1000px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">Chapter 02 \u00b7 Hercules<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(40px,5.4vw,80px); line-height:1.02; letter-spacing:-.035em; margin-bottom:36px;\">The tire dealers put<br>their own name <span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">behind.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:46ch;\">Hercules isn\u2019t built to win the shopper. It\u2019s built to win the dealer who serves them, the one person a low-interest, decide-on-the-spot purchase actually turns on. Most brands spend years trying to earn what Hercules already has: a dealer willing to stake their own reputation on it at the counter.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- bottom line -->\n    <section style=\"background:#FFFBF2; padding:clamp(80px,12vh,140px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:26px;\">The bottom line<\/div>\n        <p style=\"font-size:clamp(30px,4.4vw,64px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:18ch;\">Hercules grows at the counter, not with a consumer campaign.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- defining gap -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1000px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:24px;\">The defining gap<\/div>\n      <p style=\"font-size:clamp(22px,2.6vw,36px); font-weight:500; letter-spacing:-.02em; line-height:1.2; max-width:24ch;\">The dealers who sell Hercules rate it well. Almost no consumer knows it at all. <span style=\"color:#F04F24;\">That gap is the strategy.<\/span><\/p>\n    <\/section>\n\n    <!-- inside the trade + consumer neutral -->\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto; display:grid; grid-template-columns:repeat(2,1fr); gap:60px;\">\n        <div>\n          <div style=\"font-size:12px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:#8A8D92; margin-bottom:22px;\">Industry data \u00b7 Inside the trade<\/div>\n          <div style=\"font-size:clamp(44px,5vw,68px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:20px;\">~40<span style=\"color:#F04F24;\">%<\/span><\/div>\n          <p style=\"font-size:16px; line-height:1.6; color:#5A5C60;\">of dealers are familiar with Hercules, and a quarter have never heard of it, the highest of any legacy brand. The dealers who carry it rate its fundamentals well, but its reach across the trade is thin, and its marketing scores are the weakest on the card.<\/p>\n          <span style=\"display:block; margin-top:16px; font-size:12.5px; color:#8A8D92;\">MTD / Hercules dealer study, April 2026<\/span>\n        <\/div>\n        <div>\n          <div style=\"font-size:12px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:#F04F24; margin-bottom:22px;\">ATD research \u00b7 Among consumers \u00b7 Directional<\/div>\n          <div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(40px,4.6vw,62px); color:#080808; line-height:1; margin-bottom:20px;\">Neutral<\/div>\n          <p style=\"font-size:16px; line-height:1.6; color:#5A5C60;\">on every attribute we tested. Hercules isn\u2019t disliked; it\u2019s unknown. Almost no one names it unprompted, and no one we spoke to had most recently bought it.<\/p>\n          <span style=\"display:block; margin-top:16px; font-size:12.5px; color:#8A8D92;\">Askable Hercules consumer study, 2026 \u00b7 Directional<\/span>\n        <\/div>\n      <\/div>\n      <p style=\"max-width:1200px; margin:56px auto 0; font-size:clamp(18px,1.5vw,22px); font-weight:500; line-height:1.4; color:#080808;\">This is the shape of an undefined brand, not a damaged one. The dealers who sell Hercules believe in it; the buyer has simply never met it.<\/p>\n    <\/section>\n\n    <!-- share held + consideration bars -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">ATD research<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,42px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:22ch; margin-bottom:24px;\">It never competed for consideration, and held its share anyway.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:56px;\">Hercules has held roughly 2% of the replacement market since 1999, across four separate years of Modern Tire Dealer data. Consideration at 2.5% is consistent with that share, not below it, flat for twenty years, in a market that is no longer flat.<\/p>\n      <div style=\"display:flex; flex-direction:column; gap:14px; max-width:780px;\">\n        <div style=\"display:grid; grid-template-columns:110px 1fr 56px; gap:16px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Goodyear<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:100%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">64.9%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:110px 1fr 56px; gap:16px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Michelin<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:83%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">54.1%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:110px 1fr 56px; gap:16px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Bridgestone<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:73%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">47.4%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:110px 1fr 56px; gap:16px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Firestone<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:54%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">35.1%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:110px 1fr 56px; gap:16px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Continental<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:33%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">21.5%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:110px 1fr 56px; gap:16px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Cooper<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:23%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">14.9%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:110px 1fr 56px; gap:16px; align-items:center;\"><span style=\"font-size:15px; font-weight:600; color:#080808;\">Hercules<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:5%; background:#F04F24; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right; color:#F04F24;\">2.5%<\/span><\/div>\n      <\/div>\n      <span style=\"display:block; margin-top:22px; font-size:12.5px; color:#8A8D92;\">Brands actively considered at last purchase \u00b7 Askable consumer screener, June 2026<\/span>\n    <\/section>\n\n    <!-- trusty quote -->\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,14vh,170px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:34px;\">The evidence \u00b7 from the counter<\/div>\n        <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(24px,3vw,42px); line-height:1.3; margin-bottom:32px;\">\u201cA customer comes in looking for a Mastercraft. We\u2019re going to pitch the Hercules, because it\u2019s fared better in our community, fewer complaints, fewer returns. And the customer, we weren\u2019t expecting this, but they actually like it.\u201d<\/p>\n        <div style=\"display:flex; align-items:center; gap:14px; margin-bottom:40px;\">\n          <div style=\"width:40px; height:40px; border-radius:50%; background:#F04F24; color:#fff; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:600;\">MT<\/div>\n          <div><div style=\"font-size:15px; font-weight:600;\">Mary Trusty<\/div><div style=\"font-size:13px; color:#7A7C80;\">Trusty Tire \u00b7 dealer interview<\/div><\/div>\n        <\/div>\n        <button sc-camel-on-click=\"{{ toggles.herc_trusty }}\" style=\"background:none; border:1px solid #3A3C40; color:#fff; border-radius:100px; padding:11px 22px; font-family:'Instrument Sans'; font-size:13px; font-weight:600; letter-spacing:.04em; cursor:pointer;\">What made it work \u2192<\/button>\n        <sc-if value=\"{{ open.herc_trusty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:32px; max-width:60ch; animation:riseIn .3s ease both;\">\n            <p style=\"font-size:16.5px; line-height:1.65; color:#B8BABF; margin-bottom:14px;\">She didn\u2019t lead with price, and she didn\u2019t lead with a brand claim. She led with her own shop\u2019s record, evidence only she holds, built over time at her own counter, available nowhere else in the buying process.<\/p>\n            <p style=\"font-size:16.5px; line-height:1.65; color:#B8BABF;\">What lifts it past anecdote is that the same raw material, fewer complaints, fewer returns, sits in carriers\u2019 own records across the dealer study. The proof already exists at scale. Most dealers simply aren\u2019t using it.<\/p>\n          <\/div>\n        <\/sc-if>\n      <\/div>\n    <\/section>\n\n    <!-- the mechanism -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">The mechanism<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,42px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:22ch; margin-bottom:24px;\">Recommendation is a sequence, and only part of it runs.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:56px;\">The evidence is strongest through the middle: dealers know the brand, the proof sits in their records, and the recommendation converts when it happens. The friction sits at the two ends, where dealers are first approached, and where consumers are first introduced.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:30px 26px;\"><span style=\"display:inline-block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#8A8D92; background:#F2F3F4; padding:4px 10px; border-radius:100px; margin-bottom:14px;\">Friction<\/span><div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Trial<\/div><p style=\"font-size:14.5px; line-height:1.5; color:#5A5C60;\">Three in four non-carriers were never approached about Hercules this year.<\/p><\/div>\n        <div style=\"background:#fff; padding:30px 26px;\"><span style=\"display:inline-block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#1A8C3A; background:#EAF6EE; padding:4px 10px; border-radius:100px; margin-bottom:14px;\">Strong<\/span><div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Awareness<\/div><p style=\"font-size:14.5px; line-height:1.5; color:#5A5C60;\">Among dealers who carry it, the brand is well known and well rated.<\/p><\/div>\n        <div style=\"background:#fff; padding:30px 26px;\"><span style=\"display:inline-block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#1A8C3A; background:#EAF6EE; padding:4px 10px; border-radius:100px; margin-bottom:14px;\">Strong<\/span><div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Proof<\/div><p style=\"font-size:14.5px; line-height:1.5; color:#5A5C60;\">Fewer complaints, fewer returns sit in dealer records. The evidence exists.<\/p><\/div>\n        <div style=\"background:#fff; padding:30px 26px;\"><span style=\"display:inline-block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#1A8C3A; background:#EAF6EE; padding:4px 10px; border-radius:100px; margin-bottom:14px;\">Strong<\/span><div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Confidence<\/div><p style=\"font-size:14.5px; line-height:1.5; color:#5A5C60;\">Carrying dealers rank its adjustment policy first in the category, and rate pricing and delivery well.<\/p><\/div>\n        <div style=\"background:#fff; padding:30px 26px;\"><span style=\"display:inline-block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#1A8C3A; background:#EAF6EE; padding:4px 10px; border-radius:100px; margin-bottom:14px;\">Strong<\/span><div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">Recommendation<\/div><p style=\"font-size:14.5px; line-height:1.5; color:#5A5C60;\">A buyer who meets Hercules through a dealer\u2019s proof is roughly twice as likely to consider it next time.<\/p><\/div>\n        <div style=\"background:#fff; padding:30px 26px;\"><span style=\"display:inline-block; font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#8A8D92; background:#F2F3F4; padding:4px 10px; border-radius:100px; margin-bottom:14px;\">Friction<\/span><div style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">The handoff<\/div><p style=\"font-size:14.5px; line-height:1.5; color:#5A5C60;\">Consumers are open once introduced, but relatively few have encountered the brand.<\/p><\/div>\n      <\/div>\n      <span style=\"display:block; margin-top:22px; font-size:12.5px; color:#8A8D92;\">MTD / Hercules dealer study, April 2026 \u00b7 Askable Hercules consumer study, July 2026 \u00b7 Directional<\/span>\n    <\/section>\n\n    <!-- familiarity not quality + zero -->\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:22px;\">ATD research \u00b7 Directional<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,42px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:22ch; margin-bottom:24px;\">Where Hercules loses ground, it loses on familiarity, not on quality.<\/h2>\n        <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:40px;\">Buyers rate Hercules the way they rate the majors on what the tire actually does, trustworthy, high quality, good value, would recommend. The space it\u2019s missing is filled with \u201cdon\u2019t know enough,\u201d rarely with \u201cno.\u201d A familiarity gap like that is far cheaper to close than a gap in the product would be.<\/p>\n        <div style=\"display:flex; gap:48px; flex-wrap:wrap; padding-top:36px; border-top:1px solid #E4E5E7;\">\n          <div><div style=\"font-size:clamp(36px,4vw,54px); font-weight:600; letter-spacing:-.02em; line-height:1;\">2<span style=\"color:#F04F24;\">/3<\/span><\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:10px; max-width:24ch;\">would consider Hercules next time, from a standing start.<\/p><\/div>\n          <div><div style=\"font-size:clamp(36px,4vw,54px); font-weight:600; letter-spacing:-.02em; line-height:1;\">&lt;10<span style=\"color:#F04F24;\">%<\/span><\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:10px; max-width:26ch;\">of all attribute ratings came back negative. Nine in ten were positive or neutral.<\/p><\/div>\n        <\/div>\n        <span style=\"display:block; margin-top:24px; font-size:12.5px; color:#8A8D92;\">Askable Hercules study, July 2026 \u00b7 Directional<\/span>\n      <\/div>\n    <\/section>\n\n    <!-- in this tier the dealer is the awareness -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Industry data \u00b7 Three independent studies<\/div>\n      <h2 style=\"font-size:clamp(28px,3.4vw,48px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:18ch; margin-bottom:60px;\">In this tier, the dealer <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">is<\/span> the awareness.<\/h2>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden; margin-bottom:48px;\">\n        <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:clamp(38px,4.2vw,56px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\">Price<\/div><p style=\"font-size:15px; line-height:1.5; color:#5A5C60;\">is named as the main thing separating one tire from another, with brand ranking far below. <span style=\"color:#8A8D92;\">TireTutor / Wentworth<\/span><\/p><\/div>\n        <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:clamp(38px,4.2vw,56px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\">Half<\/div><p style=\"font-size:15px; line-height:1.5; color:#5A5C60;\">of the time, even consumers with a preferred brand switch. Loyalty barely holds (42\u201354%). <span style=\"color:#8A8D92;\">J.D. Power, 2024<\/span><\/p><\/div>\n        <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:clamp(38px,4.2vw,56px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\">Defining<\/div><p style=\"font-size:15px; line-height:1.5; color:#5A5C60;\">is the role peer-reviewed research gives the installer in which brand the buyer picks. <span style=\"color:#8A8D92;\">J. of Retailing &amp; Consumer Services<\/span><\/p><\/div>\n      <\/div>\n      <p style=\"font-size:clamp(18px,1.6vw,24px); font-weight:500; line-height:1.4; max-width:44ch;\">The customer isn\u2019t the audience for this sale. The dealer is. Win the dealer and the customer follows, there is no version of this category where it works the other way round.<\/p>\n    <\/section>\n\n    <!-- what closes the last step -->\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">What closes the last step<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:24px;\">A recommendation opens the door. Four things carry it through.<\/h2>\n        <p style=\"font-size:17px; line-height:1.6; color:#B8BABF; max-width:58ch; margin-bottom:56px;\">The counter conversation starts the sale. What lands it is proof the buyer can feel, and most of it already exists, unused.<\/p>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#222; border:1px solid #222; border-radius:14px; overflow:hidden;\">\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">01<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">The shop\u2019s own record<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">Fewer complaints and fewer returns in this store, told as local fact. Evidence only the dealer holds.<\/p><\/div>\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">02<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">Warranty and value<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">A straight read of the terms and price against the alternative on the rack, two of the buyer\u2019s top three hesitations, answered on the spot.<\/p><\/div>\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">03<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">A trusted messenger<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">It lands because it comes from the shop the buyer already relies on, not a brand competing for their attention.<\/p><\/div>\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">04<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">A straight answer online<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">Roughly a third of buyers start online and find comparing tires frustrating. Proof placed there reaches them before the counter.<\/p><\/div>\n        <\/div>\n        <p style=\"font-size:15px; color:#7A7C80; margin-top:32px; max-width:56ch;\"><strong style=\"color:#fff; font-weight:600;\">31%<\/strong> start their search online, yet only <strong style=\"color:#fff; font-weight:600;\">13%<\/strong> buy there. The research happens on a screen; the sale still closes at the counter. <span style=\"display:block; margin-top:6px;\">AutoPacific / OpenBrand, 2024\u201325<\/span><\/p>\n      <\/div>\n    <\/section>\n\n    <!-- distance to close + dutra -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">The distance to close<\/div>\n      <h2 style=\"font-size:clamp(24px,2.8vw,38px); font-weight:500; letter-spacing:-.02em; line-height:1.2; max-width:26ch; margin-bottom:48px;\">An advocate and a non-carrier are the same dealer, at different distances from the brand.<\/h2>\n      <div style=\"display:flex; align-items:stretch; gap:6px; margin-bottom:20px;\">\n        <div style=\"flex:1; padding:20px 16px; background:#FAF9F5; border-radius:8px; text-align:center;\"><div style=\"font-size:13px; color:#8A8D92;\">Never approached<\/div><\/div>\n        <div style=\"flex:1; padding:20px 16px; background:#FAF9F5; border-radius:8px; text-align:center;\"><div style=\"font-size:13px; color:#8A8D92;\">Knows it, won\u2019t stock<\/div><\/div>\n        <div style=\"flex:1; padding:20px 16px; background:#FBE9E4; border-radius:8px; text-align:center;\"><div style=\"font-size:13px; color:#5A5C60;\">Stocks it, rarely pushes<\/div><\/div>\n        <div style=\"flex:1; padding:20px 16px; background:#F7C9BC; border-radius:8px; text-align:center;\"><div style=\"font-size:13px; color:#5A5C60;\">Recommends it<\/div><\/div>\n        <div style=\"flex:1; padding:20px 16px; background:#F04F24; border-radius:8px; text-align:center;\"><div style=\"font-size:13px; font-weight:600; color:#fff;\">Advocate<\/div><\/div>\n      <\/div>\n      <div style=\"display:flex; gap:48px; flex-wrap:wrap; margin-top:36px;\">\n        <div><div style=\"font-size:clamp(34px,4vw,50px); font-weight:600; letter-spacing:-.02em; line-height:1;\">3 <span style=\"color:#F04F24;\">in 4<\/span><\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:10px; max-width:26ch;\">non-carriers were never presented the brand at all.<\/p><\/div>\n        <div><div style=\"font-size:clamp(34px,4vw,50px); font-weight:600; letter-spacing:-.02em; line-height:1;\">1 <span style=\"color:#F04F24;\">in 5<\/span><\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:10px; max-width:26ch;\">of them would add Hercules if they were simply asked.<\/p><\/div>\n      <\/div>\n      <span style=\"display:block; margin-top:20px; font-size:12.5px; color:#8A8D92;\">MTD / Hercules dealer study, April 2026<\/span>\n      <blockquote style=\"margin-top:56px; border-left:2px solid #F04F24; padding-left:28px; max-width:60ch;\">\n        <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(20px,2.2vw,29px); line-height:1.3; margin-bottom:14px;\">\u201cThe Hercules team was pretty much dismantled. We\u2019re one of the bigger Hercules dealers on the West Coast, and we\u2019ll probably never see a rep.\u201d<\/p>\n        <cite style=\"font-style:normal; font-size:14px; color:#8A8D92;\">Donald Dutra, Wright\u2019s Tire \u00b7 the field coverage is aimed the wrong way<\/cite>\n      <\/blockquote>\n    <\/section>\n\n    <!-- why 2% held: 5 connections -->\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">Why the share held at 2% for twenty years<\/div>\n        <h2 style=\"font-size:clamp(24px,2.8vw,40px); font-weight:500; letter-spacing:-.02em; line-height:1.2; max-width:26ch; margin-bottom:56px;\">The ceiling is five connections ATD already owns and hasn\u2019t joined up.<\/h2>\n        <div style=\"display:flex; flex-direction:column;\">\n          <div style=\"display:grid; grid-template-columns:64px 200px 1fr; gap:28px; align-items:baseline; padding:26px 0; border-top:1px solid #E4E5E7;\"><span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24;\">01<\/span><span style=\"font-size:18px; font-weight:600;\">Trial<\/span><span style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Non-carriers are never pitched, so the brand never reaches counters open to it.<\/span><\/div>\n          <div style=\"display:grid; grid-template-columns:64px 200px 1fr; gap:28px; align-items:baseline; padding:26px 0; border-top:1px solid #E4E5E7;\"><span style=\"fon
