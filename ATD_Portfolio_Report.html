n-bottom:10px;\">Hercules<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">A dealer stakes their name on it, because the margin, programs and reps make it worth their while. That loyalty is built, and ATD builds it.<\/p><\/div>\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-size:18px; font-weight:600; color:#F04F24; margin-bottom:10px;\">Ironman<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">No one recommends it and it still sells, because ATD put it on every shelf the self-directed buyer checks. Distribution doing the work a pitch can\u2019t.<\/p><\/div>\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-size:18px; font-weight:600; color:#F04F24; margin-bottom:10px;\">Tire Pros<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">A single local shop suddenly backs a warranty honored across the country. Overnight national scale, and only the network can hand it over.<\/p><\/div>\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-size:18px; font-weight:600; color:#F04F24; margin-bottom:10px;\">Commercial<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">The fleet buyer never meets a dealer and buys anyway, on reach and reliability alone. Proof the network can win with no one in the room.<\/p><\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">What a dealer actually buys<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">More than tires. The operating system a dealer runs the business on.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:56px;\">A single shop could never build the credit, warranties or data behind these programs, which is exactly why leaving ATD costs a dealer more than it saves.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:6px; align-items:stretch;\">\n        <div style=\"background:#FAF9F5; border-radius:12px; padding:28px 22px;\"><div style=\"font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#8A8D92; margin-bottom:12px;\">Step 1<\/div><div style=\"font-size:17px; font-weight:600; margin-bottom:8px;\">Partner<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Manufacturer-program dealers earn back-end dollars and counter incentives, funded by ATD.<\/p><\/div>\n        <div style=\"background:#FBEAE4; border-radius:12px; padding:28px 22px;\"><div style=\"font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#8A8D92; margin-bottom:12px;\">Step 2<\/div><div style=\"font-size:17px; font-weight:600; margin-bottom:8px;\">Accelerate<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Adds nationwide tire and service warranties a dealer can offer their own customers.<\/p><\/div>\n        <div style=\"background:#F7CDBF; border-radius:12px; padding:28px 22px;\"><div style=\"font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#8A8D92; margin-bottom:12px;\">Step 3<\/div><div style=\"font-size:17px; font-weight:600; margin-bottom:8px;\">Activate<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">B2B road hazard, group purchasing, stronger warranties, higher earning.<\/p><\/div>\n        <div style=\"background:#F04F24; color:#fff; border-radius:12px; padding:28px 22px;\"><div style=\"font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; opacity:.8; margin-bottom:12px;\">Step 4<\/div><div style=\"font-size:17px; font-weight:600; margin-bottom:8px;\">Tire Pros<\/div><p style=\"font-size:14px; line-height:1.5; color:rgba(255,255,255,.9);\">The franchise tier: highest earning, e-commerce partnership, full national backing.<\/p><\/div>\n      <\/div>\n      <p style=\"font-size:16px; color:#5A5C60; margin-top:28px; max-width:60ch;\">Earning rises at every step, how a transaction becomes a relationship, and the clearest sign ATD is not a box mover.<\/p>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1100px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Two forces reshaping the channel<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:56px;\">The dealer base is being bought up. Buyers are trading down. Both raise ATD\u2019s worth.<\/h2>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden; margin-bottom:48px;\">\n          <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\" data-cu=\"60\">60<span style=\"color:#F04F24;\">%<\/span><\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">of the US consumer tire wholesale channel runs through independents, the exact base now being consolidated. <span style=\"color:#8A8D92;\">MTD, 2026<\/span><\/p><\/div>\n          <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\" data-cu=\"3,500\">3,500<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">locations one consolidator passed in 2025, up from about 1,100 a year earlier. The roll-up, in a single number. <span style=\"color:#8A8D92;\">Sales Leadership, ATD<\/span><\/p><\/div>\n          <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:16px;\" data-cu=\"69\">69<span style=\"color:#F04F24;\">%<\/span><\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">of Michelin\u2019s passenger sales now come from 18-inch-plus tires, up from 68%, the majors chasing premium and ceding the value volume. <span style=\"color:#8A8D92;\">Michelin FY2025<\/span><\/p><\/div>\n        <\/div>\n        <p style=\"font-size:16px; line-height:1.65; color:#5A5C60; max-width:64ch; margin-bottom:40px;\">The majors aren\u2019t fighting the trade-down, they\u2019re stepping away from it, chasing EV and high-rim margin while low-cost imports absorb the value volume they leave behind. Both forces push demand straight into the tiers ATD serves.<\/p>\n        <blockquote style=\"border-left:2px solid #F04F24; padding-left:28px; max-width:60ch;\">\n          <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(20px,2.2vw,29px); line-height:1.3; margin-bottom:14px;\">\u201cOur business is being eroded almost on a daily basis by acquisition of independent tire dealers.\u201d<\/p>\n          <cite style=\"font-style:normal; font-size:14px; color:#8A8D92;\">Sales Leadership, ATD \u00b7 one consolidator passed 3,500 locations in 2025, up from about 1,100<\/cite>\n        <\/blockquote>\n      <\/div>\n    <\/section>\n\n    <!-- THE UNCOPYABLE POSITION -->\n    <section style=\"background:#080808; color:#fff; padding:clamp(110px,16vh,200px) 8vw;\">\n      <div style=\"max-width:1100px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:34px;\">The one position no rival can copy<\/div>\n        <h2 style=\"font-size:clamp(30px,4.2vw,64px); font-weight:500; letter-spacing:-.035em; line-height:1.04; max-width:20ch; margin-bottom:36px;\">ATD\u2019s advantage isn\u2019t scale. It\u2019s that its survival and the dealer\u2019s are the <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">same survival.<\/span><\/h2>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:58ch; margin-bottom:64px;\">Scale, reach, coverage, a TireHub or a US AutoForce can claim those too. This is the one thing they structurally cannot: a consolidator profits as independents disappear, and a manufacturer\u2019s vertical profits as it goes direct. Their gain is the independent\u2019s decline. ATD profits as they survive.<\/p>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:24px; margin-bottom:56px;\">\n          <div style=\"border:1px solid #2A2A2A; border-radius:14px; padding:36px 32px;\">\n            <div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#8A8D92; margin-bottom:16px;\">Every rival<\/div>\n            <p style=\"font-size:18px; font-weight:500; line-height:1.3; margin-bottom:12px;\">profits as independents disappear.<\/p>\n            <p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">A consolidator can\u2019t hold this position. Its model depends on the opposite. A manufacturer can\u2019t. It sells its own brands.<\/p>\n          <\/div>\n          <div style=\"border:1px solid #F04F24; border-radius:14px; padding:36px 32px; background:rgba(240,79,36,.08);\">\n            <div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#F04F24; margin-bottom:16px;\">Only ATD<\/div>\n            <p style=\"font-size:18px; font-weight:500; line-height:1.3; margin-bottom:12px;\">profits as they survive.<\/p>\n            <p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">The national distributor whose P&amp;L grows when independents stay independent and healthy. The strongest ground in the entire portfolio.<\/p>\n          <\/div>\n        <\/div>\n        <p style=\"font-size:17px; line-height:1.65; color:#B8BABF; max-width:62ch;\">And it compounds. The more consistently the network delivers the supply, credit and programs the independent depends on, the harder it is to replace, and the more its interests and the dealer\u2019s move as one. This is built into the business, not borrowed from a campaign.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">The opening<\/div>\n      <h2 style=\"font-size:clamp(24px,2.8vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:24ch; margin-bottom:48px;\">The market got more complicated. That\u2019s ATD\u2019s opening.<\/h2>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:40px;\">\n        <blockquote style=\"border-left:2px solid #F04F24; padding-left:24px;\">\n          <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(18px,2vw,25px); line-height:1.3; margin-bottom:14px;\">\u201cIt\u2019s tougher for a retailer to figure out the relationships now. It was easier to rely on two instead of ten.\u201d<\/p>\n          <cite style=\"font-style:normal; font-size:13.5px; color:#8A8D92; display:block; margin-bottom:14px;\">Trade Marketing, ATD<\/cite>\n          <p style=\"font-size:15px; line-height:1.6; color:#5A5C60;\">When the market fragments, the broad, reliable distributor becomes more valuable, not less. Complexity is a cost the dealer pays in time and risk, and ATD\u2019s breadth removes it.<\/p>\n        <\/blockquote>\n        <blockquote style=\"border-left:2px solid #F04F24; padding-left:24px;\">\n          <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(18px,2vw,25px); line-height:1.3; margin-bottom:14px;\">\u201cThe decision to disregard a national distributor and rely on their own has been a failure that hit shareholder value.\u201d<\/p>\n          <cite style=\"font-style:normal; font-size:13.5px; color:#8A8D92; display:block; margin-bottom:14px;\">Sales Leadership, ATD \u00b7 on a manufacturer that tried to replace distribution<\/cite>\n          <p style=\"font-size:15px; line-height:1.6; color:#5A5C60;\">ATD\u2019s reach isn\u2019t a commodity a manufacturer can recreate. The proof is what happens to those who try. Decades of logistics can\u2019t be stood up overnight.<\/p>\n        <\/blockquote>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">The refocus<\/div>\n        <h2 style=\"font-size:clamp(24px,2.8vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:26ch; margin-bottom:24px;\">The company that stopped chasing everything and went back to basics.<\/h2>\n        <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:44px;\">The brand doesn\u2019t have to hide a hard chapter. The story is the refocus: a company that learned what it\u2019s for and returned to it, validated by the partners who chose to stay.<\/p>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:24px;\">\n          <blockquote style=\"background:#fff; border:1px solid #E4E5E7; border-radius:14px; padding:30px 28px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(18px,1.9vw,24px); line-height:1.3; margin-bottom:14px;\">\u201cWe tried to be a master of one or two things and became a master of none. Now we\u2019re going back to being a wholesale tire distributor.\u201d<\/p><cite style=\"font-style:normal; font-size:13.5px; color:#8A8D92;\">Sales Leadership, ATD<\/cite><\/blockquote>\n          <blockquote style=\"background:#fff; border:1px solid #E4E5E7; border-radius:14px; padding:30px 28px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(18px,1.9vw,24px); line-height:1.3; margin-bottom:14px;\">\u201cThe new management is focused on tire sales again. We took that very positively.\u201d<\/p><cite style=\"font-style:normal; font-size:13.5px; color:#8A8D92;\">Ian Singh, Kumho Tires<\/cite><\/blockquote>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">The partners\u2019 verdict<\/div>\n      <h2 style=\"font-size:clamp(24px,2.8vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:24ch; margin-bottom:24px;\">The partners already rate ATD above the rest.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:48px;\">Across manufacturers the same strengths recur without prompting: national reach, service and coverage, data-sharing, marketing. This isn\u2019t ATD\u2019s claim about itself. It\u2019s its partners\u2019 verdict. The task is to gather it under one name.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:20px;\">\n        <blockquote style=\"border-top:2px solid #F04F24; padding-top:20px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:19px; line-height:1.3; margin-bottom:12px;\">\u201cShe\u2019s the best that I work with of all our national distributors.\u201d<\/p><cite style=\"font-style:normal; font-size:13px; color:#8A8D92;\">Shawn Blythe, Toyo Tires<\/cite><\/blockquote>\n        <blockquote style=\"border-top:2px solid #F04F24; padding-top:20px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:19px; line-height:1.3; margin-bottom:12px;\">\u201cATD has been a game-changer, moving us from a regional to a national distribution model.\u201d<\/p><cite style=\"font-style:normal; font-size:13px; color:#8A8D92;\">Hans Dyhrman, Nokian Tyres<\/cite><\/blockquote>\n        <blockquote style=\"border-top:2px solid #F04F24; padding-top:20px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:19px; line-height:1.3; margin-bottom:12px;\">\u201cThey have the best service and coverage, the most DCs, and the room to stock more than their competitors.\u201d<\/p><cite style=\"font-style:normal; font-size:13px; color:#8A8D92;\">Ian Singh, Kumho Tires<\/cite><\/blockquote>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,14vh,170px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">The most valuable idea in the research<\/div>\n        <h2 style=\"font-size:clamp(28px,3.6vw,52px); font-weight:500; letter-spacing:-.03em; line-height:1.08; max-width:20ch; margin-bottom:40px;\">The strongest loyalty sits closest to the customer.<\/h2>\n        <p style=\"font-size:clamp(17px,1.5vw,21px); line-height:1.6; color:#C9CACC; max-width:62ch; margin-bottom:44px;\">Across the portfolio, the strongest loyalty sits where the customer relationship is deepest, Tire Pros members, independent dealers, local operators. Again and again, the closer a business sits to the end customer, the more resilient it becomes. The question for ATD isn\u2019t simply how to support those relationships, but how to play a more meaningful role within them.<\/p>\n        <blockquote style=\"border-left:2px solid #F04F24; padding-left:28px; max-width:60ch;\">\n          <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(20px,2.2vw,29px); line-height:1.3; margin-bottom:14px;\">\u201cWe have no financial tie-in with a Tire Pros dealer. If they go to sell, we lose the business. I think ATD should start acquiring these as they come up.\u201d<\/p>\n          <cite style=\"font-style:normal; font-size:14px; color:#7A7C80;\">Sales Leadership, ATD<\/cite>\n        <\/blockquote>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(80px,11vh,130px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:24px;\">The takeaway<\/div>\n        <p style=\"font-size:clamp(24px,3vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.18; max-width:26ch;\">The corporate story isn\u2019t a rebrand. It\u2019s naming, in one voice, the position ATD alone can hold: the distributor that grows only when independents do. Every brand in this report is proof of it.<\/p>\n      <\/div>\n    <\/section>\n\n    <button sc-camel-on-click=\"{{ next.atd }}\" style=\"display:block; width:100%; text-align:left; background:#F04F24; color:#fff; border:none; cursor:pointer; padding:clamp(60px,9vh,110px) 8vw;\">\n      <span style=\"display:block; max-width:1200px; margin:0 auto;\">\n        <span style=\"display:block; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.8; margin-bottom:18px;\">Next chapter \u00b7 07<\/span>\n        <span style=\"display:flex; justify-content:space-between; align-items:baseline; gap:24px; flex-wrap:wrap;\"><span style=\"font-size:clamp(30px,4vw,58px); font-weight:500; letter-spacing:-.03em;\">The synthesis<\/span><span style=\"font-size:clamp(24px,3vw,40px);\">\u2192<\/span><\/span>\n        <span style=\"display:block; font-size:clamp(16px,1.4vw,20px); opacity:.9; margin-top:10px;\">Five brands, five ways to win, and the one position no rival can copy.<\/span>\n      <\/span>\n    <\/button>\n\n  <\/div>\n  <\/sc-if>\n\n  <!-- ============ CHAPTER 7 \u00b7 THE SYNTHESIS ============ -->\n  <sc-if value=\"{{ isSynthesis }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-15%; right:-8%; width:50%; height:100%; background:radial-gradient(closest-side, rgba(240,79,36,.42), transparent 70%); filter:blur(10px);\"><\/div>\n      <div style=\"position:relative; max-width:1000px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">Chapter 07 \u00b7 The synthesis<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(38px,5.2vw,78px); line-height:1.02; letter-spacing:-.035em; margin-bottom:36px;\">We went looking for five brand stories. We found five <span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">buying systems.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:48ch;\">Each business was studied on its own terms. Its own audience, method and questions. The research didn\u2019t return one story told five ways. It returned five genuinely different systems for how a decision gets made, who makes it, and what moves it. Most companies operate inside one. This portfolio operates inside all of them.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- what each must do -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">The mandate, brand by brand<\/div>\n      <h2 style=\"font-size:clamp(28px,3.4vw,50px); font-weight:500; letter-spacing:-.03em; line-height:1.08; max-width:22ch; margin-bottom:24px;\">Five different decisions mean five different jobs. None of them is \u201cget famous.\u201d<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:64px;\">Each brand is won in a different place, by a different person, for a different reason, so the work each one owes is different too. Open any brand to see the evidence behind it.<\/p>\n      <div style=\"display:flex; flex-direction:column; gap:20px;\">\n\n        <div style=\"border:1px solid #E4E5E7; border-radius:16px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:150px 1fr; gap:32px; padding:34px 34px;\">\n            <div><div style=\"font-size:20px; font-weight:600; margin-bottom:6px;\">Hercules<\/div><div style=\"font-size:13px; color:#8A8D92; line-height:1.4;\">Decided at the counter, by a buyer with no brand preference.<\/div><\/div>\n            <div>\n              <p style=\"font-size:clamp(18px,1.8vw,24px); font-weight:500; line-height:1.3; margin-bottom:8px;\">Win the dealer, not the shopper. <span style=\"color:#5A5C60; font-weight:400;\">Get the proof and the program to the counters already open to it.<\/span><\/p>\n              <button sc-camel-on-click=\"{{ toggles.syn_h }}\" style=\"background:none; border:none; color:#F04F24; font-family:'Instrument Sans'; font-size:13px; font-weight:600; cursor:pointer; padding:6px 0;\">The evidence \u2193<\/button>\n              <sc-if value=\"{{ open.syn_h }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px; line-height:1.6; color:#5A5C60; max-width:60ch; animation:riseIn .3s ease both;\">Dealer advocacy is the entire sale. The dealers who carry it rate its fundamentals well, yet across the consumer studies almost no one knew it, and not one had bought it unprompted. The friction is trial and introduction, not the product.<\/p><\/sc-if>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div style=\"border:1px solid #E4E5E7; border-radius:16px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:150px 1fr; gap:32px; padding:34px 34px;\">\n            <div><div style=\"font-size:20px; font-weight:600; margin-bottom:6px;\">Ironman<\/div><div style=\"font-size:13px; color:#8A8D92; line-height:1.4;\">Decided in the comparison, by a self-directed value buyer.<\/div><\/div>\n            <div>\n              <p style=\"font-size:clamp(18px,1.8vw,24px); font-weight:500; line-height:1.3; margin-bottom:8px;\">Don\u2019t build it, protect it. <span style=\"color:#5A5C60; font-weight:400;\">Stay present and well-rated on the shelves and search paths where it\u2019s already chosen.<\/span><\/p>\n              <button sc-camel-on-click=\"{{ toggles.syn_i }}\" style=\"background:none; border:none; color:#F04F24; font-family:'Instrument Sans'; font-size:13px; font-weight:600; cursor:pointer; padding:6px 0;\">The evidence \u2193<\/button>\n              <sc-if value=\"{{ open.syn_i }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px; line-height:1.6; color:#5A5C60; max-width:60ch; animation:riseIn .3s ease both;\">A budget choice made with no sense of compromise, the safest place to stand near the floor, not the floor itself. Two in three call it a genuine alternative to bigger brands, benchmarked against the majors, not the private labels beside it.<\/p><\/sc-if>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div style=\"border:1px solid #E4E5E7; border-radius:16px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:150px 1fr; gap:32px; padding:34px 34px;\">\n            <div><div style=\"font-size:20px; font-weight:600; margin-bottom:6px;\">Commercial<\/div><div style=\"font-size:13px; color:#8A8D92; line-height:1.4;\">Decided on the account, by the operator who is also the buyer.<\/div><\/div>\n            <div>\n              <p style=\"font-size:clamp(18px,1.8vw,24px); font-weight:500; line-height:1.3; margin-bottom:8px;\">Stop selling the sticker. <span style=\"color:#5A5C60; font-weight:400;\">Arm the rep with cost per mile, and size the opportunity.<\/span><\/p>\n              <button sc-camel-on-click=\"{{ toggles.syn_c }}\" style=\"background:none; border:none; color:#F04F24; font-family:'Instrument Sans'; font-size:13px; font-weight:600; cursor:pointer; padding:6px 0;\">The evidence \u2193<\/button>\n              <sc-if value=\"{{ open.syn_c }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px; line-height:1.6; color:#5A5C60; max-width:60ch; animation:riseIn .3s ease both;\">Proximity to the work transforms the brand. Consideration doubles near the trade, and commercial buyers were the only audience in the research who bought the brand unprompted, because the proof reaches the buyer directly.<\/p><\/sc-if>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div style=\"border:1px solid #E4E5E7; border-radius:16px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:150px 1fr; gap:32px; padding:34px 34px;\">\n            <div><div style=\"font-size:20px; font-weight:600; margin-bottom:6px;\">Tire Pros<\/div><div style=\"font-size:13px; color:#8A8D92; line-height:1.4;\">Decided at the local shop, by an everyday driver who needs the car working.<\/div><\/div>\n            <div>\n              <p style=\"font-size:clamp(18px,1.8vw,24px); font-weight:500; line-height:1.3; margin-bottom:8px;\">Credit the backing, protect the local feel. <span style=\"color:#5A5C60; font-weight:400;\">Make the 82,000-location warranty visible without corporatizing the shop.<\/span><\/p>\n              <button sc-camel-on-click=\"{{ toggles.syn_t }}\" style=\"background:none; border:none; color:#F04F24; font-family:'Instrument Sans'; font-size:13px; font-weight:600; cursor:pointer; padding:6px 0;\">The evidence \u2193<\/button>\n              <sc-if value=\"{{ open.syn_t }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px; line-height:1.6; color:#5A5C60; max-width:60ch; animation:riseIn .3s ease both;\">The franchise shops create real loyalty and the network captures almost none of it. Visits rate excellent, the brand rates neutral, and most customers never learn the national warranty exists. Definition has to start inside the network first.<\/p><\/sc-if>\n            <\/div>\n          <\/div>\n        <\/div>\n\n        <div style=\"border:1px solid #080808; border-radius:16px; overflow:hidden;\">\n          <div style=\"display:grid; grid-template-columns:150px 1fr; gap:32px; padding:34px 34px;\">\n            <div><div style=\"font-size:20px; font-weight:600; margin-bottom:6px; color:#F04F24;\">ATD<\/div><div style=\"font-size:13px; color:#8A8D92; line-height:1.4;\">Decided across the trade, by dealers and manufacturers choosing partners.<\/div><\/div>\n            <div>\n              <p style=\"font-size:clamp(18px,1.8vw,24px); font-weight:500; line-height:1.3; margin-bottom:8px;\">Name the position only ATD can hold: <span style=\"color:#5A5C60; font-weight:400;\">the distributor whose survival is the dealer\u2019s survival.<\/span><\/p>\n              <button sc-camel-on-click=\"{{ toggles.syn_a }}\" style=\"background:none; border:none; color:#F04F24; font-family:'Instrument Sans'; font-size:13px; font-weight:600; cursor:pointer; padding:6px 0;\">The evidence \u2193<\/button>\n              <sc-if value=\"{{ open.syn_a }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px; line-height:1.6; color:#5A5C60; max-width:60ch; animation:riseIn .3s ease both;\">Manufacturers reach most of the independent channel through ATD, and rate its execution the reason the relationship holds. But the durable claim isn\u2019t reach, a rival distributor has reach too. It\u2019s that ATD is the only player whose P&amp;L grows when independents stay independent.<\/p><\/sc-if>\n            <\/div>\n          <\/div>\n        <\/div>\n\n      <\/div>\n      <span style=\"display:block; margin-top:24px; font-size:12.5px; color:#8A8D92;\">MTD / Hercules dealer study, April 2026 \u00b7 Askable consumer &amp; visitor studies, June\u2013July 2026 \u00b7 ATD stakeholder interviews, 2026<\/span>\n    <\/section>\n\n    <!-- structural position -->\n    <section style=\"background:#080808; color:#fff; padding:clamp(100px,15vh,190px) 8vw;\">\n      <div style=\"max-width:1100px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">The portfolio finding<\/div>\n        <h2 style=\"font-size:clamp(30px,4vw,60px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:20ch; margin-bottom:40px;\">The advantage isn\u2019t being in five places. It\u2019s <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">how<\/span> ATD is built.<\/h2>\n        <p style=\"font-size:clamp(17px,1.5vw,21px); line-height:1.6; color:#C9CACC; max-width:62ch; margin-bottom:28px;\">A distributor rival, a TireHub, a US AutoForce, could sit near several of these decisions too. Presence isn\u2019t the moat. Two things are, and neither can be outspent:<\/p>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:24px; margin:44px 0;\">\n          <div style=\"border:1px solid #2A2A2A; border-radius:14px; padding:34px 30px;\">\n            <div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:16px;\">01<\/div>\n            <p style=\"font-size:18px; font-weight:500; line-height:1.3; margin-bottom:10px;\">It owns both the brands and the channel that connect them.<\/p>\n            <p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">Consolidators can buy the stores. Manufacturers can pull demand at the shelf. Neither owns both sides at once, so neither can link them the way ATD can.<\/p>\n          <\/div>\n          <div style=\"border:1px solid #F04F24; border-radius:14px; padding:34px 30px; background:rgba(240,79,36,.08);\">\n            <div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:16px;\">02<\/div>\n            <p style=\"font-size:18px; font-weight:500; line-height:1.3; margin-bottom:10px;\">Its interests and the dealer\u2019s point the same way, by structure.<\/p>\n            <p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">Every rival profits as independents disappear. ATD profits as they survive. That alignment is the one thing a rival\u2019s business model forbids them from copying.<\/p>\n          <\/div>\n        <\/div>\n        <p style=\"font-size:15px; line-height:1.65; color:#7A7C80; max-width:64ch;\">A fair caveat: this study looked at ATD\u2019s brands and ATD\u2019s channel, so rivals weren\u2019t measured at these decisions. The claim isn\u2019t that no competitor ever appears. It\u2019s that none is built to hold this exact combination. Structure is the advantage a campaign can\u2019t buy its way into.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- connected not interchangeable -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Connected, not interchangeable<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">Five separate systems, more connected than they first appear.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:62ch; margin-bottom:56px;\">None can do another\u2019s job. But strength built in one compounds in another, a property only a portfolio spanning all of them can have.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:34px 30px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Distribution stocks the counter<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">The programs, supply and margin that make a dealer willing to recommend are the same trade relationship the distribution business runs.<\/p><\/div>\n        <div style=\"background:#fff; padding:34px 30px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Commercial proof feeds retail confidence<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">The evidence that converts a commercial account, performance in service, is the same kind dealers cite when they recommend at retail: fewer complaints, fewer returns.<\/p><\/div>\n        <div style=\"background:#fff; padding:34px 30px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">The franchise organizes what the counter earns<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Local trust is the raw material the franchise network aggregates, six hundred counters of it, under a warranty that makes each shop\u2019s promise travel.<\/p><\/div>\n        <div style=\"background:#fff; padding:34px 30px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">The comparison catches the buyer the counter never meets<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">The self-directed buyer never asks a dealer, and more of the market is moving that way. Ironman is the portfolio\u2019s presence in the journey every counter-based business is blind to.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <!-- strategy phase questions -->\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">For the strategy phase<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">Four questions the research opened, each with a named route to the answer.<\/h2>\n        <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:56px;\">None is a hole in the case. Each marks a number the research pointed at but couldn\u2019t reach from outside. None blocks the work, each sharpens a section of it.<\/p>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">01<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">The margin picture<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">The economics rest on the spread a dealer earns on Hercules against the mid-tier set it displaces. The strategy phase can size it from ATD\u2019s own program reporting, a dealer-ready number.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">02<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">The program gap<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Why do enrolled dealers underuse the programs, structure, visibility, or payout? A short, targeted dealer survey answers this better than more interviews would.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">03<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">The commercial ceiling<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">How big is the commercial opportunity? It produced the strongest brand signal in the research; a wider read establishes whether it\u2019s a side line or a second business.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24; margin-bottom:14px;\">04<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:8px;\">The identity read<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Does the council\u2019s concern about network identity hold across the wider franchisee base? The council itself is the ready-made instrument to find out.<\/p><\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <!-- closing statement -->\n    <section style=\"background:#080808; color:#fff; padding:clamp(120px,18vh,220px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <h2 style=\"font-size:clamp(30px,4.2vw,64px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:22ch; margin-bottom:48px;\">The market is getting harder to navigate. The businesses that help people feel sure become more valuable.<\/h2>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:60ch; margin-bottom:28px;\">A recommendation at a counter. A rating on a listing. A fleet\u2019s own numbers. A shop that knows your name. A partner that delivers every day. Five mechanisms, five audiences, every one a version of the same thing: someone, at the moment of deciding, being helped to feel sure.<\/p>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#fff; max-width:56ch; font-weight:500;\">ATD already owns more of those moments than anyone in the market. The strategy phase is about making that advantage deliberate.<\/p>\n      <\/div>\n    <\/section>\n\n    <button sc-camel-on-click=\"{{ next.synthesis }}\" style=\"display:block; width:100%; text-align:left; background:#F04F24; color:#fff; border:none; cursor:pointer; padding:clamp(60px,9vh,110px) 8vw;\">\n      <span style=\"display:block; max-width:1200px; margin:0 auto;\">\n        <span style=\"display:block; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.8; margin-bottom:18px;\">What comes next<\/span>\n        <span style=\"display:flex; justify-content:space-between; align-items:baseline; gap:24px; flex-wrap:wrap;\"><span style=\"font-size:clamp(26px,3.4vw,48px); font-weight:500; letter-spacing:-.03em;\">The brand strategy, one brand at a time<\/span><span style=\"font-size:clamp(24px,3vw,40px);\">\u2192<\/span><\/span>\n        <span style=\"display:block; font-size:clamp(16px,1.4vw,20px); opacity:.9; margin-top:10px;\">Built on this foundation. Return to contents.<\/span>\n      <\/span>\n    <\/button>\n\n    <footer style=\"background:#050505; color:#7A7C80; padding:56px 8vw; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; font-size:12.5px; letter-spacing:.04em;\">\n      <span style=\"letter-spacing:.14em; text-transform:uppercase; font-weight:600; color:#C9CACC;\">Ammunition \u00d7 American Tire Distributors<\/span>\n      <span>ATD Brand Experience Study \u00b7 ATD2537 \u00b7 July 2026 \u00b7 Proprietary &amp; confidential<\/span>\n    <\/footer>\n\n  <\/div>\n  <\/sc-if>\n\n<\/div>\n\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { view: 'contents', open: {}, beat: 1, total: 1 };\n\n  go(v){ this.setState({ view: v, open: {} }); try { window.scrollTo(0,0); } catch(e){} }\n  toggle(k){ this.setState(s => ({ open: { ...s.open, [k]: !s.open[k] } })); }\n\n  componentDidMount(){\n    this._raf = 0;\n    this._onScroll = () => { if (this._raf) return; this._raf = requestAnimationFrame(() => { this._raf = 0; this._updateBeat(); }); };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._lastView = this.state.view;\n    this._setupView();\n  }\n  componentWillUnmount(){ try { window.removeEventListener('scroll', this._onScroll); if (this._io) this._io.disconnect(); } catch(e){} }\n  componentDidUpdate(){ if (this._lastView !== this.state.view) { this._lastView = this.state.view; this._setupView(); } }\n\n  _setupView(){\n    document.documentElement.classList.add('js-reveal');\n    if (this._io) this._io.disconnect();\n    this._io = new IntersectionObserver((ents) => {\n      ents.forEach(e => { if (e.isIntersecting) { e.target.classList.add('rv-in'); this._cuIn(e.target); } });\n    }, { threshold: 0.1, rootMargin: '0px 0px -6% 0px' });\n    this._seen = new WeakSet();\n    this._secs = [];\n    this.setState({ beat: 1 });\n    const scan = () => this._scan();\n    requestAnimationFrame(scan);\n    [80, 220, 480, 850].forEach(t => setTimeout(scan, t));\n  }\n  _scan(){\n    const root = document.getElementById('dc-root') || document.body;\n    const secs = [...root.querySelectorAll('section')];\n    const vh = window.innerHeight;\n    secs.forEach(s => {\n      if (!this._seen.has(s)) {\n        this._seen.add(s);\n        s.classList.add('rv');\n        if (s.getBoundingClientRect().top < vh * 0.92) s.classList.add('rv-in');\n        this._io.observe(s);\n      }\n    });\n    this._secs = secs;\n    if (secs.length && secs.length !== this.state.total) this.setState({ total: secs.length });\n    this._updateBeat();\n  }\n  _cuIn(node){\n    try {\n      let els = (node.matches && node.matches('[data-cu]')) ? [node] : [];\n      if (node.querySelectorAll) els = els.concat([].slice.call(node.querySelectorAll('[data-cu]')));\n      els.forEach(el => { if (el._cuDone) return; el._cuDone = 1; this._animateCount(el); });\n    } catch(e){}\n  }\n  _animateCount(el){\n    const raw = el.getAttribute('data-cu') || el.textContent;\n    const target = parseFloat(String(raw).replace(/,/g,''));\n    if (!isFinite(target)) return;\n    const dec = /\\./.test(String(raw));\n    const big = target >= 1000;\n    const fmt = (n) => dec ? n.toFixed(1) : (big ? Math.round(n).toLocaleString('en-US') : String(Math.round(n)));\n    let reduce = false; try { reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(e){}\n    if (reduce) { el.textContent = fmt(target); return; }\n    const dur = 1100, t0 = performance.now();\n    const tick = (t) => { let p = Math.min(1, (t - t0) / dur); p = 1 - Math.pow(1 - p, 3); el.textContent = fmt(target * p); if (p < 1) requestAnimationFrame(tick); else el.textContent = fmt(target); };\n    requestAnimationFrame(tick);\n  }\n  _updateBeat(){\n    const secs = this._secs || [];\n    if (!secs.length) return;\n    const mid = window.innerHeight * 0.42;\n    let idx = 0;\n    secs.forEach((s, i) => { if (s.getBoundingClientRect().top <= mid) idx = i; });\n    const beat = idx + 1;\n    if (beat !== this.state.beat) this.setState({ beat });\n  }\n\n  renderVals(){\n    const v = this.state.view;\n    const ids = ['landscape','hercules','commercial','ironman','tirepros','atd','synthesis'];\n    const titles = {\n      landscape:'The landscape', hercules:'Hercules', commercial:'Hercules Commercial',\n      ironman:'Ironman', tirepros:'Tire Pros', atd:'ATD', synthesis:'The synthesis'\n    };\n    const descs = {\n      landscape:'Why the old playbook stopped working \\u2014 and what the research found in its place.',\n      hercules:'The tire dealers put their own name behind.',\n      commercial:'The tire fleets trust once they\\u2019ve run it.',\n      ironman:'The tire people buy without asking a
