t-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24;\">02<\/span><span style=\"font-size:18px; font-weight:600;\">Coverage<\/span><span style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Field support points away from the dealers who already recommend it most.<\/span><\/div>\n          <div style=\"display:grid; grid-template-columns:64px 200px 1fr; gap:28px; align-items:baseline; padding:26px 0; border-top:1px solid #E4E5E7;\"><span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24;\">03<\/span><span style=\"font-size:18px; font-weight:600;\">Activation<\/span><span style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Whether the counter program reaches the dealer, and gets used, is an open question the strategy phase should settle.<\/span><\/div>\n          <div style=\"display:grid; grid-template-columns:64px 200px 1fr; gap:28px; align-items:baseline; padding:26px 0; border-top:1px solid #E4E5E7;\"><span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24;\">04<\/span><span style=\"font-size:18px; font-weight:600;\">Proof<\/span><span style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">The evidence that converts a buyer stays in the back office and never reaches them.<\/span><\/div>\n          <div style=\"display:grid; grid-template-columns:64px 200px 1fr; gap:28px; align-items:baseline; padding:26px 0; border-top:1px solid #E4E5E7; border-bottom:1px solid #E4E5E7;\"><span style=\"font-family:'Instrument Serif'; font-style:italic; font-size:24px; color:#F04F24;\">05<\/span><span style=\"font-size:18px; font-weight:600;\">The ask<\/span><span style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Consumers have no reason to request it by name, and none is needed if the counter carries it.<\/span><\/div>\n        <\/div>\n        <p style=\"font-size:clamp(17px,1.4vw,20px); line-height:1.55; color:#080808; font-weight:500; max-width:56ch; margin-top:44px;\">None of these needs a bigger product or a bigger ad budget. Each is a dealer-engagement problem, work ATD can do directly, and far more tractable than building awareness from zero.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- re-introduction, not a launch -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">Why the brand went quiet<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">This is a re-introduction, not a launch.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:62ch;\">Hercules is not being built from nothing. When a previous owner sold ATD, distribution stopped for roughly a decade, and the awareness built over years before that simply drained away. That history changes the task. There is latent heritage still to reclaim, especially in the western markets where the name once carried weight, so the job is to bring a lapsed brand back, not to invent one from a standing start.<\/p>\n    <\/section>\n\n    <!-- trading down tailwind -->\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Industry data \u00b7 The tailwind<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:24px;\">The category is trading down into Hercules\u2019s tier. That makes the recommendation worth more.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:48px;\">A value buyer doesn\u2019t ask for a tire by name, and the alternative on the rack is an anonymous import. That\u2019s the exact moment a dealer\u2019s word decides the sale, and an owned brand a dealer can stand behind beats one they can\u2019t. The trend the majors are bracing against is the one Hercules is built for.<\/p>\n      <div style=\"display:flex; gap:56px; flex-wrap:wrap; margin-bottom:44px;\">\n        <div><div style=\"font-size:clamp(38px,4.4vw,58px); font-weight:600; letter-spacing:-.03em; line-height:1;\">1 in 3<span style=\"color:#F04F24;\">+<\/span><\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:12px; max-width:28ch;\">of unit demand is now the value tier, and it\u2019s still taking share from tier one.<\/p><\/div>\n        <div><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(34px,3.8vw,50px); color:#080808; line-height:1.05;\">Hardened<br>into a habit<\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:12px; max-width:28ch;\">Buyers stretch tire life longer and replace one or two at a time. The trade-down is now routine.<\/p><\/div>\n      <\/div>\n      <span style=\"display:block; font-size:12.5px; color:#8A8D92; margin-bottom:44px;\">Circana, September 2025<\/span>\n      <p style=\"font-size:clamp(18px,1.6vw,24px); font-weight:500; line-height:1.35; max-width:40ch;\">Hercules is the only mid-tier tire a dealer profits on <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">and<\/span> can stand behind. The majors sell on recognition; the imports have no dealer behind them.<\/p>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(80px,11vh,130px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:24px;\">The takeaway<\/div>\n        <p style=\"font-size:clamp(24px,3vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.18; max-width:26ch;\">Hercules was never an awareness problem to outspend. It\u2019s a distribution job ATD can do directly: get the proof, the programs and the reps to the counters already open to it. Win the dealer, and the buyer follows.<\/p>\n      <\/div>\n    <\/section>\n\n    <!-- close -->\n    <button sc-camel-on-click=\"{{ next.hercules }}\" style=\"display:block; width:100%; text-align:left; background:#F04F24; color:#fff; border:none; cursor:pointer; padding:clamp(60px,9vh,110px) 8vw;\">\n      <span style=\"display:block; max-width:1200px; margin:0 auto;\">\n        <span style=\"display:block; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.8; margin-bottom:18px;\">Next chapter \u00b7 03<\/span>\n        <span style=\"display:flex; justify-content:space-between; align-items:baseline; gap:24px; flex-wrap:wrap;\"><span style=\"font-size:clamp(28px,3.6vw,54px); font-weight:500; letter-spacing:-.03em;\">Hercules Commercial<\/span><span style=\"font-size:clamp(24px,3vw,40px);\">\u2192<\/span><\/span>\n        <span style=\"display:block; font-size:clamp(16px,1.4vw,20px); opacity:.9; margin-top:10px;\">The tire fleets trust once they\u2019ve run it.<\/span>\n      <\/span>\n    <\/button>\n\n  <\/div>\n  <\/sc-if>\n\n  <!-- ============ CHAPTER 3 \u00b7 HERCULES COMMERCIAL ============ -->\n  <sc-if value=\"{{ isCommercial }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-15%; right:-8%; width:50%; height:100%; background:radial-gradient(closest-side, rgba(240,79,36,.42), transparent 70%); filter:blur(10px);\"><\/div>\n      <div style=\"position:relative; max-width:1000px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">Chapter 03 \u00b7 Hercules Commercial<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(40px,5.4vw,80px); line-height:1.02; letter-spacing:-.035em; margin-bottom:36px;\">The tire fleets trust<br>once they\u2019ve <span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">run it.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:46ch;\">Here the operator is the buyer, and the proof reaches them directly, not through a dealer\u2019s back office. Fleet buyers who know Hercules rate it above the cheaper imports and level with the majors, for less. That trust is earned in service, over miles and retreads. It points to a case the brand hasn\u2019t yet made.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FFFBF2; padding:clamp(80px,12vh,140px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:26px;\">The bottom line<\/div>\n        <p style=\"font-size:clamp(30px,4.4vw,64px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:18ch;\">Commercial already fits. Size it, and sell it on cost per mile.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">ATD research \u00b7 Directional<\/div>\n      <h2 style=\"font-size:clamp(28px,3.4vw,48px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:60px;\">The commercial buyer decides on cost per mile. Hercules is still selling on price.<\/h2>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:20px; font-weight:600; margin-bottom:12px; color:#F04F24;\">Cost per mile<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Most buyers run mixed retread-and-replace programs and rate casing quality among their top concerns. The tire is bought on cost over years, not price on the day.<\/p><\/div>\n        <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:20px; font-weight:600; margin-bottom:12px; color:#F04F24;\">Over imports<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">Buyers trust Hercules more than the budget imports at the same price, the clearest strength in the study, a lane no rival owns yet.<\/p><\/div>\n        <div style=\"background:#fff; padding:38px 30px;\"><div style=\"font-size:20px; font-weight:600; margin-bottom:12px; color:#F04F24;\">Larger fleets<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">The biggest fleets rate it premium-caliber and will rebuy. The doubt sits with single-vehicle operators, where the value pitch strains.<\/p><\/div>\n      <\/div>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-top:40px;\">Where Hercules loses, it loses on initial price. But the commercial decision is casing durability and cost per mile, the ground Hercules can win and currently cedes. Confidence arrives through the distributor rep, the top reason buyers chose it.<\/p>\n      <span style=\"display:block; margin-top:16px; font-size:12.5px; color:#8A8D92;\">Hercules Commercial Brand Study, July 2026 \u00b7 Directional<\/span>\n    <\/section>\n\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,14vh,170px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">The signal that separates commercial<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:48px;\">This was the only place in the study where buyers chose Hercules with no one selling it to them.<\/h2>\n        <div style=\"display:flex; align-items:baseline; gap:24px; flex-wrap:wrap; margin-bottom:28px;\">\n          <span style=\"font-size:clamp(64px,10vw,140px); font-weight:600; letter-spacing:-.04em; line-height:.9;\">2<span style=\"color:#F04F24;\">\u00d7<\/span><\/span>\n          <span style=\"font-size:18px; color:#B8BABF; max-width:30ch; line-height:1.5;\">Consideration roughly doubles among buyers close to the trade.<\/span>\n        <\/div>\n        <p style=\"font-size:17px; line-height:1.65; color:#B8BABF; max-width:60ch;\">Across every retail audience in the research, not one bought Hercules unprompted. Commercial operators did, because the operator is the buyer, and the proof reaches them directly instead of dying in a dealer\u2019s back office.<\/p>\n        <span style=\"display:block; margin-top:24px; font-size:12.5px; color:#7A7C80;\">Hercules Commercial Brand Study, July 2026 \u00b7 Directional<\/span>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Industry data \u00b7 Why cost per mile is the real decision<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,42px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:22ch; margin-bottom:24px;\">The whole commercial market already buys the way Hercules needs it to.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:56px;\">Fleets moved off sticker price years ago. The casing is an asset they retread and re-run, and the number they manage is cost over the life of the tire. A brand trusted to build a durable casing is buying its way into every retread that follows, the ground Hercules already earns trust on, and the one its pitch keeps stepping around.<\/p>\n      <div style=\"display:flex; gap:56px; flex-wrap:wrap; margin-bottom:44px;\">\n        <div><div style=\"font-size:clamp(38px,4.4vw,58px); font-weight:600; letter-spacing:-.03em; line-height:1;\">Up to <span style=\"color:#F04F24;\">half<\/span><\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:12px; max-width:30ch;\">less than a comparable new tire is what a quality retread costs when the casing is sound. The casing, not the sticker, is where fleet money is made. <span style=\"color:#8A8D92;\">STTC, 2025<\/span><\/p><\/div>\n        <div><div style=\"font-size:clamp(38px,4.4vw,58px); font-weight:600; letter-spacing:-.03em; line-height:1;\">2\u20133<span style=\"color:#F04F24;\">\u00d7<\/span><\/div><p style=\"font-size:15px; color:#5A5C60; margin-top:12px; max-width:30ch;\">a fleet retreads each casing, premium casings averaging 2.1. A tire trusted to last outsells a cheap one run once and scrapped. <span style=\"color:#8A8D92;\">Bridgestone estimate, 2025<\/span><\/p><\/div>\n      <\/div>\n      <blockquote style=\"border-left:2px solid #F04F24; padding-left:28px; max-width:56ch;\">\n        <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(22px,2.4vw,32px); line-height:1.3; margin-bottom:14px;\">\u201cPrice matters, but cost per mile matters more.\u201d<\/p>\n        <cite style=\"font-style:normal; font-size:14px; color:#8A8D92;\">How the trade press now frames the cautious 2025 fleet buyer \u00b7 Modern Tire Dealer, 2025<\/cite>\n      <\/blockquote>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-top:44px;\">So the pitch writes itself, and the rep is already the one making it. Give the distributor rep the cost-per-mile case, casing yield, retread performance, a reference fleet or two, and Hercules stops defending a sticker it will always lose and starts arguing the number fleets actually manage.<\/p>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">The win<\/div>\n        <h2 style=\"font-size:clamp(28px,3.4vw,48px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:20ch; margin-bottom:24px;\">A lane no one owns: trusted value, proven over the life of the tire.<\/h2>\n        <p style=\"font-size:clamp(17px,1.4vw,20px); line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:60px;\">The retail side has to build trust at the counter. Commercial already has it, and is spending it on the wrong pitch. Move from sticker price to cost per mile, and ATD claims ground no import can trust its way into, and no major will price down to reach.<\/p>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#8A8D92; margin-bottom:14px;\">What it is<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#3A3C40;\">A commercial tire fleets trust over cheaper imports and rate on par with the majors, judged on casing life and cost per mile, not the price on the day.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#8A8D92; margin-bottom:14px;\">What it takes<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#3A3C40;\">A fuller commercial read to size the opportunity, then a distributor rep equipped with the cost-per-mile case: casing yield, retread performance, and fleets willing to vouch for it.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#F04F24; margin-bottom:14px;\">What ATD wins<\/div><p style=\"font-size:15.5px; line-height:1.55; color:#3A3C40;\">A second source of demand ATD already reaches, where the fleet buys direct on trust the tire earned in service. Imports can\u2019t earn that trust, and the majors won\u2019t price down to meet it.<\/p><\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(80px,11vh,130px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:24px;\">The takeaway<\/div>\n        <p style=\"font-size:clamp(24px,3vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.18; max-width:26ch;\">The commercial win is a change of argument, not a change of product. Drop the sticker, sell cost per mile through the rep who is already trusted, and size a second stream of demand ATD already reaches.<\/p>\n      <\/div>\n    <\/section>\n\n    <button sc-camel-on-click=\"{{ next.commercial }}\" style=\"display:block; width:100%; text-align:left; background:#F04F24; color:#fff; border:none; cursor:pointer; padding:clamp(60px,9vh,110px) 8vw;\">\n      <span style=\"display:block; max-width:1200px; margin:0 auto;\">\n        <span style=\"display:block; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.8; margin-bottom:18px;\">Next chapter \u00b7 04<\/span>\n        <span style=\"display:flex; justify-content:space-between; align-items:baseline; gap:24px; flex-wrap:wrap;\"><span style=\"font-size:clamp(30px,4vw,58px); font-weight:500; letter-spacing:-.03em;\">Ironman<\/span><span style=\"font-size:clamp(24px,3vw,40px);\">\u2192<\/span><\/span>\n        <span style=\"display:block; font-size:clamp(16px,1.4vw,20px); opacity:.9; margin-top:10px;\">The tire people buy without asking anyone.<\/span>\n      <\/span>\n    <\/button>\n\n  <\/div>\n  <\/sc-if>\n\n  <!-- ============ CHAPTER 4 \u00b7 IRONMAN ============ -->\n  <sc-if value=\"{{ isIronman }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-15%; right:-8%; width:50%; height:100%; background:radial-gradient(closest-side, rgba(240,79,36,.42), transparent 70%); filter:blur(10px);\"><\/div>\n      <div style=\"position:relative; max-width:1000px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">Chapter 04 \u00b7 Ironman<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(40px,5.4vw,80px); line-height:1.02; letter-spacing:-.035em; margin-bottom:36px;\">The tire people buy<br>without <span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">asking anyone.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:46ch;\">This buyer finds Ironman themselves, on a shelf or a screen, and narrows the options through price, ratings and comparison before anyone weighs in. A dealer\u2019s word still matters, but far less than it does for Hercules. The decision is shaped by visibility and value, not recommendation.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FFFBF2; padding:clamp(80px,12vh,140px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:26px;\">The bottom line<\/div>\n        <p style=\"font-size:clamp(30px,4.4vw,64px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:20ch;\">Ironman already works. Keep it present and well-rated where its buyer is looking.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">The core finding<\/div>\n      <h2 style=\"font-size:clamp(28px,3.4vw,50px); font-weight:500; letter-spacing:-.03em; line-height:1.08; max-width:20ch; margin-bottom:60px;\">Priced at the bottom of the market. Judged against the <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">top<\/span> of it.<\/h2>\n      <div style=\"display:grid; grid-template-columns:1fr auto 1fr; gap:32px; align-items:center;\">\n        <div style=\"border:1px solid #E4E5E7; border-radius:14px; padding:34px 30px;\">\n          <div style=\"font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#8A8D92; margin-bottom:16px;\">Where the price sits<\/div>\n          <div style=\"font-size:22px; font-weight:600; margin-bottom:10px;\">The floor<\/div>\n          <p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">By price, a budget-tier tire, roughly $60\u2013$100 to enter, sharing a shelf with Sailun, Accelera and Delinte. On price alone, it belongs at the floor.<\/p>\n          <span style=\"display:block; margin-top:14px; font-size:12px; color:#8A8D92;\">Tires Easy / Tire Advise, 2026<\/span>\n        <\/div>\n        <div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:28px; color:#F04F24;\">but<\/div>\n        <div style=\"border:1px solid #080808; border-radius:14px; padding:34px 30px;\">\n          <div style=\"font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#F04F24; margin-bottom:16px;\">Where buyers place it<\/div>\n          <div style=\"font-size:22px; font-weight:600; margin-bottom:10px;\">One step down from the majors<\/div>\n          <p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Asked which brand it most resembles, buyers don\u2019t name the private labels beside it. They name the major manufacturers.<\/p>\n          <span style=\"display:block; margin-top:14px; font-size:12px; color:#8A8D92;\">Askable Ironman study, July 2026 \u00b7 Directional<\/span>\n        <\/div>\n      <\/div>\n      <p style=\"font-size:clamp(18px,1.5vw,22px); font-weight:500; line-height:1.4; max-width:44ch; margin-top:56px;\">The whole of Ironman lives in the distance between those two boxes. Its value isn\u2019t that it\u2019s cheap. It\u2019s that it doesn\u2019t feel cheap to the people who choose it.<\/p>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">ATD research \u00b7 Directional<\/div>\n        <h2 style=\"font-size:clamp(28px,3.4vw,48px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:56px;\">No one sells Ironman to the buyer. The buyer sells it to themselves.<\/h2>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#F04F24; margin-bottom:12px;\">Research first<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">The decision starts on a screen<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Buyers looked at brand and review sites before buying, rather than arriving cold and deciding at the counter.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#F04F24; margin-bottom:12px;\">Self-led<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">Little persuasion in the loop<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Dealer pitch, rep and campaign play only a limited role. By the time a person is involved, the choice is largely made.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:#F04F24; margin-bottom:12px;\">2 in 3<\/div><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">Would buy it again<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">The strongest intent-to-buy-again signal in the study. A conviction reached alone is harder to shift.<\/p><\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Industry data<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">The decision moved online, to exactly where Ironman is decided.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:56px;\">For most brands, the shift to a decided-before-the-store buyer is a loss. Ironman never had that counter conversation to lose. The behaviour the rest of the category is scrambling to adapt to is the only behaviour Ironman has ever been bought through.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:38px 32px;\"><div style=\"font-size:clamp(30px,3vw,42px); font-weight:600; letter-spacing:-.02em; line-height:1.1; margin-bottom:14px;\" data-cu=\"47\">47% search a brand by name<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Most tire researchers use Google to compare before buying, and nearly half search a specific brand, both higher still under 40. <span style=\"color:#8A8D92;\">AutoPacific / YouGov, 2024\u201325<\/span><\/p><\/div>\n        <div style=\"background:#fff; padding:38px 32px;\"><div style=\"font-size:clamp(30px,3vw,42px); font-weight:600; letter-spacing:-.02em; line-height:1.1; margin-bottom:14px;\">Almost no one notices a tire ad<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Fame, the majors\u2019 deepest advantage, lands on almost no one at the point of decision. <span style=\"color:#8A8D92;\">Consumer Reports, 2024<\/span><\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">ATD research \u00b7 Directional<\/div>\n        <h2 style=\"font-size:clamp(28px,3.4vw,48px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:56px;\">Ironman isn\u2019t the cheapest tire on the shelf. That\u2019s the point.<\/h2>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden; margin-bottom:48px;\">\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">Undercut<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Sailun and Linglong sit below Ironman on price. If the buyer wanted only the lowest number, Ironman wouldn\u2019t win.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">Chosen anyway<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Two in three would buy it again, the strongest such signal in the study. A pure floor brand doesn\u2019t earn that.<\/p><\/div>\n          <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">The read<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Not the cheapest, the best-trusted of the cheap. Ironman wins the value comparison, not the price war beneath it.<\/p><\/div>\n        <\/div>\n        <p style=\"font-size:clamp(18px,1.6vw,26px); font-weight:500; line-height:1.35; max-width:40ch;\">Its position isn\u2019t the floor. It\u2019s the <span style=\"font-family:'Instrument Serif'; font-style:italic; color:#F04F24;\">safest place to stand near it.<\/span><\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">Earned, not inherited<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">The majors inherited their trust. Ironman has to earn it every time.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:56px;\">Nearly all buyers called it trustworthy, but the phrasing that kept recurring was that it earned the label once they\u2019d seen what it offered for the money. Trust arrived at the point of comparison, built from evidence in front of them, not carried in from reputation. A harder starting point, and a more honest one.<\/p>\n      <div style=\"display:flex; flex-direction:column; gap:16px; max-width:720px;\">\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Durability<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:100%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">86%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Price<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:99%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">85%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#5A5C60;\">Traction<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:93%; background:#8A8D92; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right;\">80%<\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:120px 1fr 56px; gap:18px; align-items:center;\"><span style=\"font-size:15px; font-weight:600; color:#080808;\">The name<\/span><span style=\"height:12px; background:#EDEEF0; border-radius:6px;\"><span style=\"display:block; height:100%; width:64%; background:#F04F24; border-radius:6px;\"><\/span><\/span><span style=\"font-size:14px; font-weight:600; text-align:right; color:#F04F24;\">55%<\/span><\/div>\n      <\/div>\n      <p style=\"font-size:15px; color:#5A5C60; max-width:56ch; margin-top:24px;\">Brand ranks last of the top four factors. For the majors, decades of advertising did the trusting in advance. Ironman has none stored up. <span style=\"color:#8A8D92;\">Tire Review / Google-Compete, 2024<\/span><\/p>\n    <\/section>\n\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,14vh,170px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"display:flex; gap:56px; flex-wrap:wrap; margin-bottom:44px;\">\n          <div><div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(30px,3.4vw,46px); line-height:1.1;\">A knowable<br>world<\/div><\/div>\n          <div style=\"max-width:36ch;\"><p style=\"font-size:17px; line-height:1.65; color:#B8BABF;\">A large share of all US tire units run through Ironman\u2019s primary home, the country\u2019s largest tire retailer, which alone draws more than one in five tire shoppers. Its entire world fits on a single sheet, and a knowable world is a coverable one.<\/p><span style=\"display:block; margin-top:14px; font-size:12.5px; color:#7A7C80;\">OpenBrand, Q1 2025<\/span><\/div>\n        <\/div>\n        <div style=\"border-top:1px solid #222; padding-top:44px; display:flex; gap:56px; flex-wrap:wrap; align-items:baseline;\">\n          <div style=\"font-size:clamp(44px,5vw,72px); font-weight:600; letter-spacing:-.03em; line-height:1;\">1 in 3<span style=\"color:#F04F24;\">+<\/span><\/div>\n          <div style=\"max-width:36ch;\"><p style=\"font-size:17px; line-height:1.65; color:#B8BABF;\">of all tire demand is now the budget tier, and still climbing. The trading-down buyer wants the lowest safe price and proof it\u2019s safe, exactly the read Ironman owns. The brand doesn\u2019t need to change to meet the moment. The moment is moving to it.<\/p><span style=\"display:block; margin-top:14px; font-size:12.5px; color:#7A7C80;\">Circana, September 2025 \u00b7 OpenBrand, Q1 2025<\/span><\/div>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">The opportunity \u00b7 white space<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:26ch; margin-bottom:24px;\">Ironman's clearest opening is a tire it doesn't yet sell.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:62ch; margin-bottom:44px;\">Most drivers say they feel confident off-road, yet almost none own a tire built for it, and the interest runs highest among younger, brand-open buyers. That is a specific, unclaimed job. An all-terrain line, All Country, gives Ironman something to be famous for, aimed at exactly the social-native buyer the majors overlook.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden; max-width:640px; margin-bottom:40px;\">\n        <div style=\"background:#fff; padding:32px 28px;\"><div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:14px;\" data-cu=\"63\">63<span style=\"font-size:.5em; font-weight:600;\">%<\/span><\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">feel confident driving off-road. <span style=\"color:#7A7C80;\">Hankook Gauge Index<\/span><\/p><\/div>\n        <div style=\"background:#fff; padding:32px 28px;\"><div style=\"font-size:clamp(40px,4.4vw,60px); font-weight:600; letter-spacing:-.03em; line-height:1; margin-bottom:14px; color:#F04F24;\">8<span style=\"font-size:.5em; font-weight:600;\">%<\/span><\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">own a tire designed for it. The gap is the brief. <span style=\"color:#7A7C80;\">Hankook Gauge Index<\/span><\/p><\/div>\n      <\/div>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:62ch;\">First, though, give it room. Ironman's price has crept too close to Hercules, which has pushed Hercules up into a tier its awareness cannot carry. Drop Ironman back to the true value rung, let it be the confident everyday entry, and it becomes the on-ramp into the family rather than a rival to the brand above it.<\/p>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">What the research says Ironman is<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">Not a budget tire hoping to be seen. A self-selected value brand that already works.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:56px;\">Six studies, gathered separately, describe one brand with unusual consistency. The task isn\u2019t to build Ironman, but to protect its earned position, and keep it present and well-rated everywhere the buyer is already looking.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Self-chosen<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Bought through the buyer\u2019s own research. The conviction is theirs.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Value, not cheap<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Priced at the floor, understood a step below the majors. Wins the comparison.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Trust is earned<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">No inherited fame. It earns trust on rating, spec and price.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Concentrated<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Won or lost in a few value shelves and the search paths that feed them.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">In the current<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">The market is moving to value-first, decided-before-the-store buying. Its native ground.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(80px,11vh,130px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:24px;\">The takeaway<\/div>\n        <p style=\"font-size:clamp(24px,3vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.18; max-width:26ch;\">The job for Ironman is protection, not construction. Keep it visible and well-rated on the value shelves and search paths where its buyer already decides, and let the market keep moving toward it.<\/p>\n      <\/div>\n    <\/section>\n\n    <button sc-camel-on-click=\"{{ next.ironman }}\" style=\"display:block; width:100%; text-align:left; background:#F04F24; color:#fff; border:none; cursor:pointer; padding:clamp(60px,9vh,110px) 8vw;\">\n      <span style=\"display:block; max-width:1200px; margin:0 auto;\">\n        <span style=\"display:block; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.8; margin-bottom:18px;\">Next chapter \u00b7 05<\/span>\n        <span style=\"display:flex; justify-content:space-between; align-items:baseline; gap:24px; flex-wrap:wrap;\"><span style=\"font-size:clamp(30px,4vw,58px); font-weight:500; letter-spacing:-.03em;\">Tire Pros<\/span><span style=\"font-size:clamp(24px,3vw,40px);\">\u2192<\/span><\/span>\n        <span style=\"display:block; font-size:clamp(16px,1.4vw,20px); opacity:.9; margin-top:10px;\">The network customers trust without ever crediting it.<\/span>\n      <\/span>\n    <\/button>\n\n  <\/div>\n  <\/sc-if>\n\n  <!-- ============ CHAPTER 5 \u00b7 TIRE PROS ============ -->\n  <sc-if value=\"{{ isTirepros }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-15%; right:-8%; width:50%; height:100%; background:radial-gradient(closest-side, rgba(240,79,36,.42), transparent 70%); filter:blur(10px);\"><\/div>\n      <div style=\"position:relative; max-width:1000px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">Chapter 05 \u00b7 Tire Pros<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(38px,5.2vw,76px); line-height:1.02; letter-spacing:-.035em; margin-bottom:36px;\">The network customers trust<br>without ever <span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">crediting it.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:48ch;\">Six hundred and fifty independently-owned franchise shops, standing on a warranty honored at more than eighty thousand locations. The infrastructure of a national brand delivering the service of a trusted local one, and almost none of the value it creates comes back to Tire Pros itself.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FFFBF2; padding:clamp(80px,12vh,140px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:26px;\">The bottom line<\/div>\n        <p style=\"font-size:clamp(28px,4.2vw,60px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:20ch;\">Tire Pros works. Credit the national backing without corporatizing the local shop.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">ATD research \u00b7 Who walks in<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">Start with who walks in. It explains why the shop gets the credit.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:56px;\">This buyer doesn\u2019t want a relationship with a brand. They want a working car and a person they trust to keep it that way, fast. Trust like that forms around a face and a location, not a logo, so the audience doesn\u2019t just explain the network\u2019s invisibility. It predicts it.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:32px 24px;\"><div style=\"font-size:clamp(24px,2.4vw,34px); font-weight:600; letter-spacing:-.02em; margin-bottom:12px;\">~9 in 10<\/div><div style=\"font-size:15px; font-weight:600; margin-bottom:8px;\">Essential transport<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">The vehicle is essential to daily life. Not a purchase to enjoy, a problem to solve fast.<\/p><\/div>\n        <div style=\"background:#fff; padding:32px 24px;\"><div style=\"font-size:clamp(24px,2.4vw,34px); font-weight:600; letter-spacing:-.02em; margin-bottom:12px;\">Middle<\/div><div style=\"font-size:15px; font-weight:600; margin-bottom:8px;\">Income, value-led<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Incomes cluster in the middle band, and price is the single factor that matters most.<\/p><\/div>\n        <div style=\"background:#fff; padding:32px 24px;\"><div style=\"font-size:clamp(24px,2.4vw,34px); font-weight:600; letter-spacing:-.02em; margin-bottom:12px;\">2 in 3<\/div><div style=\"font-size:15px; font-weight:600; margin-bottom:8px;\">Usually a woman deciding<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Women are ~65% of auto-service customers, and twice as likely to pass on a recommendation.<\/p><\/div>\n        <div style=\"background:#fff; padding:32px 24px;\"><div style=\"font-size:clamp(24px,2.4vw,34px); font-weight:600; letter-spacing:-.02em; margin-bottom:12px;\" data-cu=\"35\">35\u201354<\/div><div style=\"font-size:15px; font-weight:600; margin-bottom:8px;\">Prime working age<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">Running households and schedules where a car off the road is a genuine disruption.<\/p><\/div>\n      <\/div>\n      <span style=\"display:block; margin-top:18px; font-size:12.5px; color:#8A8D92;\">Askable Tire Pros visitor study, July 2026 \u00b7 AAIA \u00b7 WomenCertified \u00b7 Directional<\/span>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">ATD research \u00b7 Directional<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:24px;\">The model works. The proof is that they come back.<\/h2>\n        <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:60ch; margin-bottom:48px;\">This is the retention a national chain spends heavily to engineer, and these shops already have it. Nowhere in the research is the operating model the weakness. Which turns the rest of this chapter into a single question: not whether the model works, but where the value it produces goes.<\/p>\n        <div style=\"display:flex; flex-direction:column; gap:18px; max-width:720px;\">\n          <div style=\"display:grid; grid-template-columns:1fr auto; gap:24px; align-items:center; padding-bottom:18px; border-bottom:1px solid #E4E5E7;\"><span style=\"font-size:16px; color:#3A3C40;\">Returned or plan to return to the shop<\/span><span style=\"font-size:clamp(24px,2.4vw,32px); font-weight:600; color:#F04F24;\">~90%<\/span><\/div>\n          <div style=\"display:grid; grid-template-columns:1fr auto; gap:24px; align-items:center; padding-bottom:18px; border-bottom:1px solid #E4E5E7;\"><span style=\"font-size:16px; color:#3A3C40;\">Would return next time they need tires<\/span><span style=\"font-size:clamp(24px,2.4vw,32px); font-weight:600; color:#F04F24;\" data-cu=\"80\">80%+<\/span><\/div>\n          <div style=\"display:grid; grid-template-columns:1fr auto; gap:24px; align-items:center;\"><span style=\"font-size:16px; color:#3A3C40;\">Would recommend the shop to others<\/span><span style=\"font-size:clamp(24px,2.4vw,32px); font-weight:600; color:#F04F24;\" data-cu=\"80\">80%+<\/span><\/div>\n        <\/div>\n        <span style=\"display:block; margin-top:20px; font-size:12.5px; color:#8A8D92;\">Askable Tire Pros visitor study, July 2026 \u00b7 Directional<\/span>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">The leak<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:48px;\">Ask why they chose the shop, and the network never comes up.<\/h2>\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#8A8D92; margin-bottom:24px;\">Rated most important in the decision<\/div>\n      <div style=\"display:flex; flex-direction:column; gap:16px; max-width:720px;\">\n        <div style=\"display:grid; grid-template-columns:180px 1fr; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#3A3C40;\">Price or a deal<\/span><span style=\"height:14px; background:#EDEEF0; border-radius:7px;\"><span style=\"display:block; height:100%; width:100%; background:#8A8D92; border-radius:7px;\"><\/span><\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:180px 1fr; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#3A3C40;\">Been there before<\/span><span style=\"height:14px; background:#EDEEF0; border-radius:7px;\"><span style=\"display:block; height:100%; width:82%; background:#8A8D92; border-radius:7px;\"><\/span><\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:180px 1fr; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#3A3C40;\">Convenient location<\/span><span style=\"height:14px; background:#EDEEF0; border-radius:7px;\"><span style=\"display:block; height:100%; width:68%; background:#8A8D92; border-radius:7px;\"><\/span><\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:180px 1fr; gap:18px; align-items:center;\"><span style=\"font-size:15px; color:#3A3C40;\">Store\u2019s reputation<\/span><span style=\"height:14px; background:#EDEEF0; border-radius:7px;\"><span style=\"display:block; height:100%; width:44%; background:#8A8D92; border-radius:7px;\"><\/span><\/span><\/div>\n        <div style=\"display:grid; grid-template-columns:180px 1fr; gap:18px; align-items:center;\"><span style=\"font-size:15px; font-weight:600; color:#080808;\">The brand / signage<\/span><span style=\"height:14px; background:#EDEEF0; border-radius:7px;\"><span style=\"display:block; height:100%; width:12%; background:#F04F24; border-radius:7px;\"><\/span><\/span><\/div>\n      <\/div>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:60ch; margin-top:40px;\">Customers chose on price, habit and proximity. The one factor that is unmistakably Tire Pros, the sign over the door, ranked dead last. The shop delivers in full; what\u2019s missing is the credit the network earns for standing behind it.<\/p>\n    <\/section>\n\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,14vh,170px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">The unspent asset<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:48px;\">The warranty gets explained. The part no rival can match gets left out.<\/h2>\n        <p style=\"font-size:17px; line-height:1.65; color:#B8BABF; max-width:60ch; margin-bottom:48px;\">The warranty gets explained on almost every visit, but in its least distinctive form. The national reciprocity, the thing no independent shop on earth can offer, goes unsaid. The network pays to maintain an eighty-thousand-location promise, and describes it as though it stopped at the door.<\/p>\n        <div style=\"display:flex; gap:56px; flex-wrap:wrap;\">\n          <div><div style=\"font-size:clamp(44px,5.4vw,80px); font-weight:600; letter-spacing:-.03em; line-height:1;\" data-cu=\"82,000\">82,000<\/div><p style=\"font-size:15px; color:#B8BABF; margin-top:12px; max-width:26ch;\">locations honor the warranty nationwide, against roughly 650 shops. The backing reaches a hundred times past the network itself.<\/p><\/div>\n          <div><div style=\"font-size:clamp(44px,5.4vw,80px); font-weight:600; letter-spacing:-.03em; line-height:1;\" data-cu=\"60\">60%<span style=\"color:#F04F24;\">+<\/span><\/div><p style=\"font-size:15px; color:#B8BABF; margin-top:12px; max-width:26ch;\">didn\u2019t know the warranty is honored nationwide at all. The conversation leaves out the one thing that makes it distinctive.<\/p><\/div>\n        <\/div>\n        <span style=\"display:block; margin-top:28px; font-size:12.5px; color:#7A7C80;\">Tire Pros warranty program, 2026 \u00b7 Askable visitor study, July 2026<\/span>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1100px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">The harder problem<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">Customers can\u2019t place what Tire Pros is, even on the simplest question.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:48px;\">An awareness problem has a shape you fix with exposure. This is harder. Even regular customers hold no agreed idea of what the network is, and the answers don\u2019t gather around a single wrong belief that could be corrected. They scatter, because there\u2019s no defined thing to know.<\/p>\n      <div style=\"border:1px solid #E4E5E7; border-radius:14px; padding:44px 40px; background:#FAF9F5;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#8A8D92; margin-bottom:28px;\">Asked plainly, \u201cwhat is it?\u201d<\/div>\n        <div style=\"display:grid; grid-template-columns:auto 1fr; gap:28px; align-items:center;\">\n          <div style=\"font-family:'Instrument Serif'; font-style:italic; font-size:80px; color:#F04F24; line-height:1;\">?<\/div>\n          <div>\n            <p style=\"font-size:19px; font-weight:600; margin-bottom:8px;\">The largest group can\u2019t say at all.<\/p>\n            <p style=\"font-size:15.5px; line-height:1.55; color:#5A5C60;\">The rest split evenly between three answers, a national brand, a local shop, a network of shops. No shared idea, nothing common to correct or build on.<\/p>\n          <\/div>\n        <\/div>\n      <\/div>\n      <span style=\"display:block; margin-top:18px; font-size:12.5px; color:#8A8D92;\">Askable Tire Pros visitor study, July 2026 \u00b7 Directional<\/span>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1100px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">ATD research \u00b7 Directional<\/div>\n        <h2 style=\"font-size:clamp(24px,2.8vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:26ch; margin-bottom:48px;\">When the network speaks in concrete terms, it sticks. When it speaks in feeling, it doesn\u2019t.<\/h2>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:24px; margin-bottom:44px;\">\n          <div style=\"border:1px solid #080808; border-radius:14px; padding:34px 30px;\">\n            <div style=\"font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#F04F24; margin-bottom:16px;\">The one that stuck<\/div>\n            <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(22px,2.4vw,30px); line-height:1.25; margin-bottom:12px;\">\u201cHassle-Free, Guaranteed.\u201d<\/p>\n            <p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">A plain guarantee, something a customer can hold the shop to.<\/p>\n          <\/div>\n          <div style=\"border:1px solid #E4E5E7; border-radius:14px; padding:34px 30px;\">\n            <div style=\"font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#8A8D92; margin-bottom:16px;\">What didn\u2019t<\/div>\n            <p style=\"font-size:clamp(20px,2.2vw,26px); font-weight:500; line-height:1.25; margin-bottom:12px; color:#8A8D92;\">The feeling-led brand lines.<\/p>\n            <p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Aspirational lines about how a shop should make you feel, rather than what it will do, barely registered. Identity lands when it\u2019s built from what Tire Pros guarantees.<\/p>\n          <\/div>\n        <\/div>\n        <blockquote style=\"border-left:2px solid #F04F24; padding-left:28px; max-width:60ch;\">\n          <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(20px,2.2vw,29px); line-height:1.3; margin-bottom:14px;\">\u201cI knew Tire Pros was gonna be in a bit of a lull until they could find their identity again. I don\u2019t think there\u2019s a great identity right now nationally.\u201d<\/p>\n          <cite style=\"font-style:normal; font-size:14px; color:#8A8D92;\">Chris DeLaval, Tire Pros of Yucca Valley \u00b7 franchise council member<\/cite>\n        <\/blockquote>\n        <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-top:40px;\">A customer who can\u2019t describe the network is a marketing gap. An operator who can\u2019t is a business-model gap, the more serious of the two. Franchisees join on the promise of belonging to something bigger than their own shop. Definition has to start here, inside the network and through the council, before it reaches a customer.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">The position no competitor holds<\/div>\n      <h2 style=\"font-size:clamp(28px,3.4vw,48px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:56px;\">Everyone else is local or national. Tire Pros is the only one that\u2019s both.<\/h2>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden; margin-bottom:48px;\">\n        <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">The independent shop<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Owns local trust. No national scale, and no warranty that follows the customer past its own door.<\/p><\/div>\n        <div style=\"background:#fff; padding:36px 30px;\"><div style=\"font-size:18px; font-weight:600; margin-bottom:10px;\">The national chain<\/div><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">Owns scale. Can\u2019t manufacture the local trust that brings a customer back to one person, year after year.<\/p><\/div>\n        <div style=\"background:#080808; color:#fff; padding:36px 30px;\"><div style=\"font-size:18px; font-weight:600; margin-bottom:10px; color:#F04F24;\">Tire Pros<\/div><p style=\"font-size:15px; line-height:1.55; color:#B8BABF;\">Holds both: locally trusted shops standing on a warranty honored nationwide. And today it spends neither side.<\/p><\/div>\n      <\/div>\n      <blockquote style=\"border-left:2px solid #F04F24; padding-left:28px; max-width:60ch;\">\n        <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(20px,2.2vw,29px); line-height:1.3; margin-bottom:14px;\">\u201cIt didn\u2019t matter so much that we had Goodyear or Firestone. It mattered more the service we were receiving and the dependability of the company.\u201d<\/p>\n        <cite style=\"font-style:normal; font-size:14px; color:#8A8D92;\">Tonya \u00b7 Tire Pros customer, choosing the shop\u2019s trust over the tire brand on the box<\/cite>\n      <\/blockquote>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:48px;\">\n        <div>\n          <div style=\"font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#8A8D92; margin-bottom:24px;\">What the model creates<\/div>\n          <div style=\"display:flex; flex-direction:column; gap:12px;\">\n            <div style=\"font-size:16px; padding:14px 0; border-bottom:1px solid #E4E5E7;\">Trust in the shop<\/div>\n            <div style=\"font-size:16px; padding:14px 0; border-bottom:1px solid #E4E5E7;\">Loyalty and repeat visits<\/div>\n            <div style=\"font-size:16px; padding:14px 0; border-bottom:1px solid #E4E5E7;\">Recommendations to others<\/div>\n            <div style=\"font-size:16px; padding:14px 0; border-bottom:1px solid #E4E5E7;\">High service satisfaction<\/div>\n            <div style=\"font-size:16px; padding:14px 0;\">A national warranty behind it all<\/div>\n          <\/div>\n        <\/div>\n        <div>\n          <div style=\"font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#F04F24; margin-bottom:24px;\">What the network captures<\/div>\n          <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(32px,3.6vw,50px); line-height:1.1; margin-bottom:24px;\">Almost none of it.<\/p>\n          <p style=\"font-size:16px; line-height:1.65; color:#5A5C60;\">The trust credits the local shop. The warranty\u2019s national reach goes unsaid. The identity is undefined, inside the network and out. Read as awareness, this is a line item for media. Read as what it is, a structural split between the value created and the value kept. It\u2019s the defining question for the business.<\/p>\n        <\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1000px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">Why the brand stays invisible<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:26ch; margin-bottom:24px;\">The strategy already exists. It evaporates at the storefront.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:62ch;\">Tire Pros is not short of a plan. There is a funded national program, a NASCAR partnership, low-cost paid search and local SEO, and an audience worked out in detail. The spend goes out the door. Almost none of it reaches the customer standing in the store, because the franchise model can run national advertising but cannot compel a local owner to fly the badge. That reframes the problem, from building a brand to fixing the last mile, and the last mile is the more tractable job.<\/p>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1000px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">One consideration before scaling<\/div>\n      <h2 style=\"font-size:clamp(24px,2.8vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.15; max-width:26ch; margin-bottom:24px;\">The local feel may be part of what makes the loyalty work.<\/h2>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:20px;\">This customer bonds to a face and a location because the shop feels local and independent. So the network\u2019s quiet profile may be doing more than leaking value. It may be part of what earns the loyalty. Corporatizing the shopfront could soften the very thing that brings people back.<\/p>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-bottom:20px;\">That makes the opportunity narrower, and safer, than building a national brand over the top of the shops. Make the network\u2019s backing visible and credited, the 82,000-location warranty and a clear idea of what Tire Pros stands for, while leaving each shop\u2019s name, feel and autonomy exactly as they are. Capture the value at the network level; protect the trust at the shop level.<\/p>\n      <p style=\"font-size:clamp(17px,1.4vw,20px); line-height:1.55; color:#080808; font-weight:500; max-width:56ch;\">Then prove it. Lift the network-backing message across a defined set of shops, hold a matched set as a benchmark, and measure retention. Scale what lifts loyalty, and drop what softens it.<\/p>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(80px,11vh,130px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:24px;\">The takeaway<\/div>\n        <p style=\"font-size:clamp(24px,3vw,40px); font-weight:500; letter-spacing:-.025em; line-height:1.18; max-width:26ch;\">The fix isn\u2019t a louder brand over the shops. It\u2019s crediting the national backing the network already provides, while leaving the local feel untouched. Capture the value up top, protect the trust below.<\/p>\n      <\/div>\n    <\/section>\n\n    <button sc-camel-on-click=\"{{ next.tirepros }}\" style=\"display:block; width:100%; text-align:left; background:#F04F24; color:#fff; border:none; cursor:pointer; padding:clamp(60px,9vh,110px) 8vw;\">\n      <span style=\"display:block; max-width:1200px; margin:0 auto;\">\n        <span style=\"display:block; font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; opacity:.8; margin-bottom:18px;\">Next chapter \u00b7 06<\/span>\n        <span style=\"display:flex; justify-content:space-between; align-items:baseline; gap:24px; flex-wrap:wrap;\"><span style=\"font-size:clamp(30px,4vw,58px); font-weight:500; letter-spacing:-.03em;\">ATD<\/span><span style=\"font-size:clamp(24px,3vw,40px);\">\u2192<\/span><\/span>\n        <span style=\"display:block; font-size:clamp(16px,1.4vw,20px); opacity:.9; margin-top:10px;\">The network the whole industry runs on.<\/span>\n      <\/span>\n    <\/button>\n\n  <\/div>\n  <\/sc-if>\n\n  <!-- ============ CHAPTER 6 \u00b7 ATD ============ -->\n  <sc-if value=\"{{ isAtd }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"animation:fadeIn .5s ease both;\">\n\n    <section style=\"min-height:100vh; background:#080808; color:#fff; display:flex; flex-direction:column; justify-content:center; padding:120px 8vw 80px; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-15%; right:-8%; width:50%; height:100%; background:radial-gradient(closest-side, rgba(240,79,36,.42), transparent 70%); filter:blur(10px);\"><\/div>\n      <div style=\"position:relative; max-width:1000px;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#F04F24; margin-bottom:30px;\">Chapter 06 \u00b7 ATD<\/div>\n        <h1 style=\"font-weight:500; font-size:clamp(40px,5.4vw,80px); line-height:1.02; letter-spacing:-.035em; margin-bottom:36px;\">The network the whole<br>industry <span style=\"font-family:'Instrument Serif'; font-style:italic; font-weight:400; color:#F04F24;\">runs on.<\/span><\/h1>\n        <p style=\"font-size:clamp(18px,1.6vw,23px); line-height:1.55; color:#C9CACC; max-width:46ch;\">Every tire in this study reaches a shop because ATD put it there. Dealers call it service, manufacturers call it reach, franchisees call it support. One network doing all of it, described four different ways, and named as none.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#FFFBF2; padding:clamp(80px,12vh,140px) 8vw;\">\n      <div style=\"max-width:1000px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:26px;\">The bottom line<\/div>\n        <p style=\"font-size:clamp(28px,4.2vw,60px); font-weight:500; letter-spacing:-.035em; line-height:1.05; max-width:20ch;\">ATD is the network the channel can\u2019t function without. Name that, before a competitor does.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">ATD stakeholder interviews, 2026<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:56px;\">Across the channel, what ATD is for comes down to three questions.<\/h2>\n      <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:38px 30px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(22px,2.2vw,28px); color:#080808; margin-bottom:16px;\">\u201cDo you have it?\u201d<\/p><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">The right product, in stock, when a dealer calls. Breadth and depth no single shop can hold.<\/p><\/div>\n        <div style=\"background:#fff; padding:38px 30px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(22px,2.2vw,28px); color:#080808; margin-bottom:16px;\">\u201cWhen can I get it?\u201d<\/p><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">On the counter in time to fit the car that\u2019s waiting. Delivery and reach that decide the sale.<\/p><\/div>\n        <div style=\"background:#fff; padding:38px 30px;\"><p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(22px,2.2vw,28px); color:#080808; margin-bottom:16px;\">\u201cWhat\u2019s in it for me?\u201d<\/p><p style=\"font-size:15px; line-height:1.55; color:#5A5C60;\">A reason to choose ATD and profit by it. Price, margin, and the programs behind them.<\/p><\/div>\n      <\/div>\n      <p style=\"font-size:17px; line-height:1.65; color:#5A5C60; max-width:62ch; margin-top:40px;\">Every manufacturer interviewed named the same three, unprompted. Not image, not identity, the three things the whole channel already measures ATD on. The brand doesn\u2019t need reinventing. It needs articulating.<\/p>\n    <\/section>\n\n    <section style=\"background:#FAF9F5; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1100px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">The fragmentation<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:48px;\">Every audience rates ATD highly. Each one is describing a different company.<\/h2>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:24px; margin-bottom:36px;\">\n          <div style=\"background:#fff; border:1px solid #E4E5E7; border-radius:14px; padding:32px 28px;\">\n            <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(19px,2vw,24px); line-height:1.3; margin-bottom:16px;\">\u201cCompared to our other vendors, they\u2019re at least a half a step or two above the other ones.\u201d<\/p>\n            <div style=\"font-size:13.5px; color:#8A8D92; margin-bottom:18px;\">Mary Trusty \u00b7 dealer<\/div>\n            <button sc-camel-on-click=\"{{ toggles.atd_dealer }}\" style=\"background:none; border:1px solid #E4E5E7; border-radius:100px; padding:9px 18px; font-family:'Instrument Sans'; font-size:12.5px; font-weight:600; cursor:pointer; color:#080808;\">What the dealer means \u2192<\/button>\n            <sc-if value=\"{{ open.atd_dealer }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px; line-height:1.6; color:#5A5C60; margin-top:18px; animation:riseIn .3s ease both;\">To the dealer, ATD is execution: delivery, credit, and the day-to-day handling that beats the vendors alongside it.<\/p><\/sc-if>\n          <\/div>\n          <div style=\"background:#fff; border:1px solid #E4E5E7; border-radius:14px; padding:32px 28px;\">\n            <p style=\"font-family:'Instrument Serif'; font-style:italic; font-size:clamp(19px,2vw,24px); line-height:1.3; margin-bottom:16px;\">\u201cATD has always been an integral part of our go-to-market strategy.\u201d<\/p>\n            <div style=\"font-size:13.5px; color:#8A8D92; margin-bottom:18px;\">Ryan Fairbanks \u00b7 Continental<\/div>\n            <button sc-camel-on-click=\"{{ toggles.atd_maker }}\" style=\"background:none; border:1px solid #E4E5E7; border-radius:100px; padding:9px 18px; font-family:'Instrument Sans'; font-size:12.5px; font-weight:600; cursor:pointer; color:#080808;\">What the maker means \u2192<\/button>\n            <sc-if value=\"{{ open.atd_maker }}\" hint-placeholder-val=\"{{ false }}\"><p style=\"font-size:15px; line-height:1.6; color:#5A5C60; margin-top:18px; animation:riseIn .3s ease both;\">To the manufacturer, ATD is reach: the way a brand gets to dealers it could never cover alone.<\/p><\/sc-if>\n          <\/div>\n        <\/div>\n        <p style=\"font-size:clamp(17px,1.4vw,20px); line-height:1.5; color:#080808; font-weight:500; max-width:56ch;\">Add the franchisee, who calls it support, and the fleet, who calls it reliability. Every audience values ATD, and every one describes only the part that touches them. A company this valued and this fragmented is undervalued by default.<\/p>\n      <\/div>\n    <\/section>\n\n    <section style=\"padding:clamp(90px,12vh,150px) 8vw; max-width:1200px; margin:0 auto;\">\n      <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#8A8D92; margin-bottom:20px;\">One machine, five systems<\/div>\n      <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:24ch; margin-bottom:24px;\">All five lean on the same systems. None of them sees the whole of what it\u2019s worth.<\/h2>\n      <p style=\"font-size:17px; line-height:1.6; color:#5A5C60; max-width:60ch; margin-bottom:56px;\">Read together, these are the reasons the channel can\u2019t function without ATD, and the reason no acquirer can rebuild it by buying up shops one at a time.<\/p>\n      <div style=\"display:grid; grid-template-columns:repeat(5,1fr); gap:1px; background:#E4E5E7; border:1px solid #E4E5E7; border-radius:14px; overflow:hidden;\">\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Distribution<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">The trucks and warehouses that put every tire on every shelf.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Technology<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">The ordering and inventory system shops run on every day, and rarely leave.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Data<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">What sells where, across thousands of shops, that no single store could see.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Loyalty<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">The programs and margin that decide which tire a dealer reaches for.<\/p><\/div>\n        <div style=\"background:#fff; padding:28px 22px;\"><div style=\"font-size:16px; font-weight:600; margin-bottom:10px;\">Infrastructure<\/div><p style=\"font-size:14px; line-height:1.5; color:#5A5C60;\">The credit and financing that keep an independent shop open and solvent.<\/p><\/div>\n      <\/div>\n    <\/section>\n\n    <section style=\"background:#080808; color:#fff; padding:clamp(90px,12vh,150px) 8vw;\">\n      <div style=\"max-width:1200px; margin:0 auto;\">\n        <div style=\"font-size:12px; font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:#F04F24; margin-bottom:20px;\">See it in the brands<\/div>\n        <h2 style=\"font-size:clamp(26px,3vw,44px); font-weight:500; letter-spacing:-.03em; line-height:1.1; max-width:22ch; margin-bottom:24px;\">The network\u2019s worth, made real four times over.<\/h2>\n        <p style=\"font-size:17px; line-height:1.6; color:#B8BABF; max-width:60ch; margin-bottom:56px;\">Four brands, four different jobs, in four corners of the market, each works because of something only ATD provides. The brands are where the value shows up; the network is where it comes from.<\/p>\n        <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:#222; border:1px solid #222; border-radius:14px; overflow:hidden;\">\n          <div style=\"background:#080808; padding:34px 30px;\"><div style=\"font-size:18px; font-weight:600; color:#F04F24; margi
